<!doctype html>
<html><head><meta charset="utf-8"><title>TTRPG</title>
<style>
  * { box-sizing: border-box; }
  :root { --gold:#f5c542; --bg:#14161a; --panel:#1b1e24; --line:#2c313a; --ink:#d7dae0; --footerH:156px; }
  /* BULLETPROOF dock: console is absolutely pinned to the bottom (fixed height); #app fills the
     rest absolutely. No grid/flex track can collapse, so the console never floats. */
body { margin: 0; font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--ink); position: relative; height: 100vh; overflow: hidden; }
  /* hotkey letter (Warcraft style): the access key glows gold, rest stays default */
  .hk { color: var(--gold); }
  #app { position: absolute; top: 0; left: 0; right: 0; bottom: var(--footerH);
         display: flex; flex-direction: column; overflow: hidden; }
  #app.menu #topbar { display: none; }
  #topbar { flex: none; display: flex; align-items: center; gap: 14px; padding: 8px 12px;
            background: #1d2026; border-bottom: 1px solid var(--line); }
  #topbar .navbtns { display: flex; gap: 8px; }
  #topbar button { padding: 5px 11px; cursor: pointer; background: #21252c; color: var(--ink);
                   border: 1px solid var(--line); border-radius: 6px; font: inherit; }
  #topbar button:hover { border-color: #4c6286; } #topbar button:disabled { opacity: .4; cursor: default; }
  #modebtn { width: 84px; text-align: left; }   /* fixed to just fit '🎭 Player' so toggling DM<->Player doesn't resize */
  #labview { position: absolute; inset: 0; display: none; background: var(--bg); z-index: 5; }
  #labview.on { display: block; } #labiframe { width: 100%; height: 100%; border: none; }
  .labx { position: absolute; top: 8px; right: 12px; z-index: 6; width: 30px; height: 30px; border-radius: 7px;
          background: #21252c; color: var(--ink); border: 1px solid var(--line); cursor: pointer; font-size: 14px; }
  .labx:hover { border-color: #4c6286; }
  #topbar kbd { font-size: 11px; color: #9aa3b2; border: 1px solid var(--line); border-radius: 4px; padding: 0 4px; margin-left: 4px; }
  #crumb { color: #9aa3b2; font-size: 13px; margin-left: auto; }
  #screen { flex: 1; min-height: 0; position: relative; overflow: hidden; }

  /* MAIN MENU — two seamless full-bleed buttons, no borders */
  .menu { position: absolute; inset: 0; display: grid; grid-template-rows: 1fr 1fr; }
  .menu .slab { display: flex; align-items: center; justify-content: center; font-size: 64px; cursor: pointer;
                color: #1b1e24; user-select: none; transition: filter .12s; }
  .menu .slab:hover { filter: brightness(1.08); }
  .menu .slab.players { background: #6f9ad6; } .menu .slab.world { background: #7fae6a; }
  .menu .slab .hk { color: #fff; }

  /* PLAYER PICKER */
  .picker { position: absolute; inset: 0; display: flex; flex-direction: column; }
  .picker .p { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 42px;
               cursor: pointer; color: #14161a; }
  .picker .p:hover { filter: brightness(1.08); }

  /* PLAYER WHEEL */
  /* the wheel FILLS the screen: viewBox is 100x100, scaled to COVER (slice) so wedges reach the edges */
  .wheelwrap { position: absolute; inset: 0; overflow: hidden; }
  #wheelsvg { width: 100%; height: 100%; display: block; }
  .slice { cursor: pointer; transition: filter .1s; } .slice:hover { filter: brightness(1.12); }
  .slabel { fill: #14161a; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
  .slabel .ttl { font: 600 4.4px ui-monospace, Menlo, monospace; } .slabel .hk { fill: var(--gold); }
  .slabel .sub { font: 500 2.9px ui-monospace, Menlo, monospace; fill: #14161add; }
  .clabel { fill: var(--ink); font: 600 5px ui-monospace, Menlo, monospace; text-anchor: middle; dominant-baseline: middle;
            pointer-events: none; } .clabel .hk { fill: var(--gold); }

  /* GENERIC SUB-PAGE / scroll surface */
  .page { position: absolute; inset: 0; overflow: auto; padding: 14px 18px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 7px; padding: 10px 12px; margin: 0 0 12px; }
  .card h3 { margin: 0 0 8px; font-size: 13px; color: #8ab4f8; }
  .kv { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 2px 12px; }
  .kv span { color: #9aa3b2; } .kv b { color: #e8eaed; font-weight: 500; }
  .pill { display: inline-block; background: #21252c; border: 1px solid var(--line); border-radius: 12px;
          padding: 2px 9px; margin: 2px 3px 2px 0; }
  .muted { color: #6b7280; }
  .grid { display: grid; gap: 3px; }
  .cell { border: 1px solid var(--line); border-radius: 4px; padding: 4px 6px; min-height: 46px; background: var(--panel); cursor: pointer; }
  .cell:hover { border-color: #4c6286; } .cell .b { color: #9aa3b2; font-size: 11px; } .cell .o { font-size: 18px; }

  /* INVENTORY */
  .invgrid { display: grid; grid-template-columns: 600px 1fr; gap: 12px; align-items: start; }
  .zone { border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; max-height: 168px; overflow: auto; }
  .zone h4 { margin: 0 0 6px; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .zone.armor { background: #3a3d44; } .zone.accessories { background: #4a3a57; } .zone.clothing { background: #57502f; }
  .slotrow { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  /* body-coverage: an editable 00% field + a proportion bar, left of each slot (sized for "100%", no slack) */
  .covcell { flex: none; width: 64px; }
  .covtop { display: flex; align-items: baseline; gap: 4px; }
  .covinput { width: 34px; flex: none; background: var(--bg); color: var(--ink); border: 1px solid var(--line);
              border-radius: 4px; padding: 1px 3px; font: inherit; font-size: 11px; text-align: right; }
  .covinput:focus { border-color: #6a8fd8; outline: none; }
  .covper { font-size: 10px; color: #8a93a2; white-space: nowrap; }
  .covbar { width: 100%; height: 5px; margin-top: 2px; background: #2c313a; border-radius: 3px; overflow: hidden; }
  .covfill { height: 100%; background: #6a8fd8; }
  .zonetot { font-weight: 400; text-transform: none; letter-spacing: 0; color: #8a93a2; }
  .zonetot.bad { color: #e0a04a; }
  .slotrow label { width: 120px; flex: none; color: #cfd3da; } .slotrow select { flex: 1; background: var(--bg); color: var(--ink);
            border: 1px solid var(--line); border-radius: 5px; padding: 3px 6px; font: inherit; }
  /* equipment chips scroll horizontally instead of stacking into a tall block (e.g. many rings) */
  .slotrow .chips { flex: 1; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; }
  .slotrow .chip { flex: none; }
  .radars { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 8px; }
  .radar { border-radius: 8px; padding: 6px; } .radar .t { font-size: 12px; margin-bottom: 2px; color:#222; }
  .flatbox { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }
  .flatbox .kv b { color: var(--gold); }
  .itemgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px,72px)); gap: 8px; }
  .itembox { height: 72px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel);
             display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
  .itembox:hover { border-color: #4c6286; } .itembox .em { font-size: 30px; } .itembox .n { font-size: 10px; color:#9aa3b2; }
  .itembox.add { font-size: 34px; color: var(--gold); }
  /* item editor top: fields left, shape editor top-right */
  .ietop { display: flex; gap: 18px; align-items: flex-start; }
  .ietop .ieleft { flex: 1; min-width: 0; }
  .ietop .ieright { flex: none; width: 240px; }
  /* item shape editor */
  .shgrid { display: grid; gap: 3px; }
  .shcell { width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--line);
            background: #1b1f26; cursor: pointer; }
  .shcell:hover { border-color: #4c6286; }
  .shcell.on { background: #3f7d52; border-color: #5bbd7a; }
  .shcell.ctr.on { background: #5bbd7a; box-shadow: inset 0 0 0 2px #2c5e3c; }
  .shcell.ctr:not(.on) { border-color: #5b7d6a; }
  /* grid inventory */
  .invwrap { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
  .invcontainer { border: 2px solid #6f8fae; padding: 10px 12px 12px; }
  .invhead { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
  .invhead .ctool { cursor: pointer; color: var(--gold); margin-left: auto; }
  .invhead .ctool:hover { filter: brightness(1.3); }
  .invgridwrap { position: relative; overflow: hidden; }
  .gcell { position: absolute; border-radius: 4px; background: #00000033; border: 1px solid #ffffff14; }
  .gitem { position: absolute; cursor: grab; z-index: 2; }
  .gitem:active { cursor: grabbing; }
  .gicell { position: absolute; border-radius: 4px; background: #c9a24a55; border: 1px solid var(--gold); }
  .giem { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
          font-size: 20px; pointer-events: none; }
  .invghost { position: fixed; pointer-events: none; z-index: 9999; opacity: 0.75; }
  .invghost .gicell { background: #5bbd7a66; border-color: #5bbd7a; }
  .loosebin { margin-top: 12px; border: 1px dashed #4c6286; border-radius: 8px; padding: 8px 10px; }
  .loosebin h4 { margin: 0 0 8px; font-size: 12px; }
  .itembox.shaped { border-style: dashed; cursor: grab; }
  .contedit { position: fixed; inset: 0; background: #000a; display: none; align-items: center;
              justify-content: center; z-index: 10000; }
  .contbox { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
             padding: 18px 20px; max-width: 520px; max-height: 86vh; overflow: auto; }

  /* ITEM EDITOR */
  .editor { max-width: 760px; } .editor .row { display: flex; gap: 8px; align-items: center; margin: 6px 0; }
  .editor label.f { width: 120px; color: #9aa3b2; }
  .editor input, .editor select, .editor textarea { background: var(--bg); color: var(--ink); border: 1px solid var(--line);
            border-radius: 5px; padding: 4px 7px; font: inherit; }
  .editor input[type=text], .editor textarea { flex: 1; } .editor textarea { min-height: 34px; resize: vertical; }
  .sub { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; margin: 8px 0; }
  .sub h4 { margin: 0 0 6px; font-size: 12px; color: #8ab4f8; }
  .todo { border-left: 3px solid #b5803f; } .todo h4 { color: #d9a441; }
  .hint { color: #6b7280; font-size: 12px; }
  /* clickable chips (replace the tiny checkboxes — whole chip toggles) */
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 16px; cursor: pointer;
          border: 1px solid var(--line); background: #20242b; user-select: none; }
  .chip .box { width: 15px; height: 15px; border: 1px solid #6b7280; border-radius: 4px; flex: none; }
  .chip:hover { border-color: #4c6286; } .chip.on { border-color: var(--gold); background: #2a2e25; }
  .chip.on .box { background: var(--gold); border-color: var(--gold); }
  .chip.cat-armor { color: #c8ccd2; } .chip.cat-accessories { color: #c9a7e6; } .chip.cat-clothing { color: #e6d27a; }
  .chip.full { opacity: .4; cursor: default; }   /* candidate that can't be equipped — slot at capacity */
  /* right-aligned label/value stat grid */
  .statgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 6px 14px; }
  .statgrid .sg { display: grid; grid-template-columns: 1fr 92px; align-items: center; gap: 8px; }
  .statgrid .sg label { text-align: right; color: #9aa3b2; } .statgrid .sg input { width: 92px; }
  .warn { color: #e06c6c; font-size: 12px; }
  /* STATS TAB — base × mult + flat, each editable by a tiny delta box under its current value */
  .stattab { display: flex; flex-direction: column; gap: 2px; }
  .statrow { display: grid; grid-template-columns: 210px 64px 14px 64px 14px 64px 18px 72px 1fr;
             align-items: center; gap: 6px; padding: 2px 0; border-bottom: 1px solid #20242b; }
  .sname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .statrow.sthead { color: #9aa3b2; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; border: none; }
  .statrow.sthead > div { text-align: center; }
  .sname { color: #cfd3da; }
  .sfield { display: flex; flex-direction: column; gap: 1px; }
  .sval { background: var(--panel); border: 1px solid var(--line); border-radius: 4px; padding: 2px 5px; text-align: right; }
  .sdelta { width: 100%; height: 15px; font: 11px ui-monospace, Menlo, monospace; padding: 0 4px; text-align: right;
            background: var(--bg); color: #9aa3b2; border: 1px solid var(--line); border-radius: 3px; }
  .sdelta:focus { color: var(--ink); border-color: #4c6286; outline: none; }
  .sop { text-align: center; color: #6b7280; } .scomp { color: var(--gold); text-align: right; font-weight: 600; }
  .sformula { color: #9aa3b2; font-size: 11px; font: inherit; background: transparent; border: 1px solid transparent;
              border-radius: 5px; padding: 3px 6px; min-width: 0; width: 100%; }
  .sformula:hover { border-color: var(--line); } .sformula:focus { outline: none; border-color: #4c6286; background: var(--bg); color: var(--ink); }
  /* add-stat row (stats tab) + the "+ new X" chip (talents/effects/abilities lists) */
  .addstat { display: flex; gap: 6px; margin-bottom: 10px; }
  .addstat input { flex: 1; background: var(--bg); color: var(--ink); border: 1px solid var(--line); border-radius: 5px; padding: 5px 8px; font: inherit; }
  .addstat input:first-of-type { flex: 0 0 160px; }
  .addchip { display: inline-block; cursor: pointer; padding: 6px 12px; border-radius: 16px; border: 1px dashed #4c6286;
             color: var(--gold); user-select: none; } .addchip:hover { background: #20242b; }
  /* quest progress elements (objectives) — on the card */
  .qobjs { margin-top: 8px; border-top: 1px solid #262b33; padding-top: 6px; }
  .qobjhead { font-size: 11px; color: #9aa3b2; margin-bottom: 4px; }
  .qobj { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .qobj.qdone .qobl { color: #81c784; }
  .qobl { flex: 1; min-width: 0; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .qbin { flex: none; width: 20px; height: 20px; border: 1px solid #4c6286; border-radius: 5px; background: #1b1e24;
          color: #81c784; font-size: 13px; line-height: 18px; text-align: center; cursor: pointer; }
  .qbin.on { background: #243a26; border-color: #4f8a52; }
  .qbar { flex: none; width: 150px; height: 16px; border: 1px solid #3a4150; border-radius: 5px; background: #1b1e24;
          cursor: pointer; overflow: hidden; display: flex; }
  .qsegbar .qseg { flex: 1; border-right: 1px solid #3a4150; }
  .qsegbar .qseg:last-child { border-right: none; }
  .qsegbar .qseg.on { background: #3f6ea5; }
  .qpctbar { position: relative; }
  .qpctbar .qfill { height: 100%; background: #3f8a63; }
  .qnum { flex: none; width: 44px; text-align: right; font-size: 12px; color: #c4c9d2; }
  /* quest objectives BUILDER (editor) */
  .qbuilder { border: 1px solid #2c313a; border-radius: 8px; padding: 8px 10px; margin: 4px 0; background: #16191e; }
  .qbhead { font-size: 13px; color: #cdd3dc; margin-bottom: 6px; display: flex; gap: 10px; align-items: baseline; }
  .qbrow { display: flex; gap: 6px; align-items: center; margin-bottom: 5px; }
  .qbtype { flex: none; width: 116px; }
  .qblabel { flex: 2; min-width: 0; }
  .qbgoal { flex: none; width: 64px; }
  .qbgoalsp { flex: none; width: 64px; font-size: 11px; color: #6f7785; text-align: center; }
  .qbproc { flex: 2; min-width: 0; }
  .qbdel { flex: none; width: 26px; height: 26px; border-radius: 6px; border: 1px solid #5a3a3a; background: #2a1e1e;
           color: #e07a7a; cursor: pointer; }
  .qbuilder input, .qbuilder select { background: #1b1e24; color: var(--ink); border: 1px solid var(--line);
           border-radius: 6px; padding: 4px 6px; font: inherit; }
  /* quests list */
  .questlist { display: flex; flex-direction: column; gap: 3px; }
  .questrow { display: grid; grid-template-columns: 28px 200px 1fr; align-items: center; gap: 8px; padding: 3px 0; border-bottom: 1px solid #20242b; }
  .qbtn { width: 24px; height: 24px; border-radius: 6px; border: 1px solid #4c6286; background: #21252c; color: var(--gold); cursor: pointer; }
  .qbtn:hover { background: #2a2e25; }
  .elbtn { width: 24px; height: 24px; padding: 0; border-radius: 6px; cursor: pointer; font-size: 12px;
     background: var(--bg); color: var(--ink); border: 1px solid var(--line); }
  .elbtn.edit:hover { border-color: #6a8fd8; color: #8ab4f8; }
  .elbtn.done:hover { border-color: #2e7d32; color: #81c784; }
  .elbtn.del:hover { border-color: #c0392b; color: #e88; }
  .qname { color: #cfd3da; } .qdesc { color: #9aa3b2; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ABILITY CARDS */
  .ability-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; margin-top: 8px; }
  .ability-card { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; }
  .ability-card.granted { border-color: #5a6a45; background: #191d18; }   /* conferred by a held/worn item */
  .grantbadge { font-size: 10px; color: #a7c957; border: 1px solid #5a6a45; border-radius: 4px; padding: 1px 6px;
                white-space: nowrap; font-family: ui-monospace, Menlo, monospace; }
  .igtrig { flex: none; width: 116px; } .igkind { flex: none; width: 84px; } .igspec { flex: 2; min-width: 0; }
  .ab-name { font-weight: 600; color: #e8eaed; } .ab-lvl { font-size: 11px; color: #9aa3b2; margin-left: 6px; }
  .ab-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .ab-head .ab-name { flex: 1; min-width: 0; }              /* title wraps; never pushes the buttons */
  .ab-btns { flex: 0 0 auto; display: flex; align-items: center; gap: 5px; }
  .ab-sub { margin: 1px 0 5px; }   /* identifier subtitle on its own line (frees the title row) */
  .ab-sub .ab-id, .ab-sub .ab-lvl { margin-left: 0; margin-right: 8px; }
  .ab-desc { color: #9aa3b2; font-size: 12px; margin: 3px 0 6px; }
  .ab-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .abtag { font-size: 11px; padding: 2px 7px; border-radius: 10px; border: 1px solid; white-space: nowrap; }
  .abt-cast  { border-color: #6a8fd8; color: #8ab4f8; background: #1c2540; }
  .abt-cd    { border-color: #6b7280; color: #9aa3b2; background: #1e2128; }
  .abt-cost  { border-color: #b5803f; color: #d9a441; background: #28200e; }
  .abt-aff   { border-color: #6a4fb5; color: #b9a8d8; background: #1e1630; }
  .abt-dmg   { border-color: #c0392b; color: #e88;    background: #2a1212; }
  .abt-hit   { border-color: #2e7d32; color: #81c784; background: #0d200e; }
  .abt-misc  { border-color: var(--line); color: #9aa3b2; background: var(--bg); }
  .ab-id { font-size: 11px; color: #6b7280; margin-left: 6px; font-family: ui-monospace, Menlo, monospace; }
  .ab-uuid { font-size: 10px; color: #6b7280; font-family: ui-monospace, Menlo, monospace; border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; }
  .flagrow { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .flagctl { display: inline-flex; align-items: center; gap: 4px; flex: none; border: 1px solid var(--line); border-radius: 8px; padding: 3px 4px 3px 8px; }
  .flagctl .flagname { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: #9aa3b2; margin-right: 2px; }
  .flagctl .flagname.fon { color: #81c784; }
  .flagctl .flagname::before { content: "● "; color: transparent; }   /* dot space reserved always (no shift on toggle) */
  .flagctl .flagname.fon::before { color: #81c784; }
  .flagctl button { flex: none; white-space: nowrap; font-size: 11px; padding: 2px 7px; border-radius: 6px;
     cursor: pointer; background: var(--bg); color: var(--ink); border: 1px solid var(--line); }
  .flagctl button:hover { background: #20242b; border-color: #4c6286; }
  .flaglist { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .flagentry { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 6px 8px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
  .flagconns { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; min-width: 0; }
  .flagconn { font-size: 12px; color: #9aa3b2; border: 1px solid var(--line); border-radius: 10px; padding: 1px 8px; }
  .flagconn b { color: #8ab4f8; font-weight: 600; }
  /* functions folder tree */
  .fntreebox { margin-top: 10px; font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
  .fnrow { display: flex; align-items: center; gap: 10px; padding: 2px 0; }
  .fnrow:hover { background: #1b1e24; }
  .fnbtns { flex: 0 0 auto; width: 84px; display: flex; gap: 4px; }            /* fixed left column -> buttons stay aligned */
  .fnspacer { display: inline-block; width: 84px; }
  .fnbtns .fnbtn { width: 24px; height: 22px; padding: 0; border-radius: 5px; cursor: pointer; font-size: 12px;
           background: var(--bg); color: var(--ink); border: 1px solid var(--line); }   /* tree icon buttons only */

<script>
let STATE = null;
// ---- navigation state machine ------------------------------------------------
// NAV.stack is the breadcrumb; NAV.cur is the current screen. ` -> menu, Esc -> back.
const NAV = { stack: [], cur: {kind: "menu"} };
let KEYMAP = {};   // per-screen single-key -> action, rebuilt on every render
let ADD_ACTION = null;   // the current screen's "+" action; fired by pressing '=' (shift+= / plus)
let EDIT_NOTE = null;    // id of the calendar note currently being edited inline (null = none)
let CAL_VIEW = null;     // {mode:'month'|'year', month:1..14} — calendar view (null until first render)
let CAL_ADD = null;      // {month, day} the inline note-creator is open on (null = none)
let CAL_DATESET = false;  // is the date-setter panel open?
let STORY_DESC = false;  // storyline sort: newest-first?
let STORY_EDIT = null;   // id of the storyline entry being edited inline (null = none)
let MODE = "dm";         // "dm" sees everything; "player" hides fogged cells + DM notes
let ATLAS_OPT = {weather: true, structures: true, entities: true};  // atlas layer toggles
let ATLAS_DATA = null;   // last-rendered atlas lookups, for hover tooltips
const WEATHER_GLYPH = {clear: "☀️", cloudy: "☁️", drizzle: "🌦️", rain: "🌧️", storm: "⛈️",
  fog: "🌫️", windy: "💨", snow: "🌨️", hail: "🧊", heatwave: "🥵"};
const WEATHER_TINT = {drizzle: "#4a7a9a", rain: "#2f5f93", storm: "#3a2c63", snow: "#cfe2f2",
  hail: "#9fc0d8", fog: "#6b7280", cloudy: "#5b6470", windy: "#6a8a7a", heatwave: "#b5651d"};
const ENT_DOT = {player: "●", npc: "◆", mob: "▲"};
let ATLAS_VIEW = null;   // selected viewpoint player — drives whose fog + allegiance colors the atlas shows
let ATLAS_PAINT = null;  // "reveal"|"dim"|"hide" — click-to-paint the viewpoint player's fog
const ALLEGIANCE_COLOR = {ally: "#81c784", neutral: "#e0c878", hostile: "#e07a7a"};
function toggleMode() {
  MODE = MODE === "dm" ? "player" : "dm";
  const b = document.getElementById("modebtn");
  if (b) b.textContent = MODE === "dm" ? "👑 DM" : "🎭 Player";

// ---- hotkey-label helpers (gold access letter) -------------------------------
function hkHTML(label, key) {
  const i = label.toLowerCase().indexOf(key.toLowerCase());
  if (i < 0) return label + ` <span class="hk">(${key})</span>`;
  return label.slice(0, i) + `<span class="hk">${label[i]}</span>` + label.slice(i + 1);
}
function hkSVG(label, key) {
  const i = label.toLowerCase().indexOf(key.toLowerCase());
  if (i < 0) return label;
  return label.slice(0, i) + `<tspan class="hk">${label[i]}</tspan>` + label.slice(i + 1);
}

async function refresh() {

// ---- render dispatcher -------------------------------------------------------
// Re-rendering rebuilds #screen's innerHTML, which would wipe anything half-typed into a form
// (item editor, function body, new-stat boxes…) or any slot-chip you'd toggled but not saved.
// So when render() is re-drawing the SAME screen (e.g. after a console command updates state),
// we snapshot the form controls + toggled chips first and restore them afterward. Navigating to a
// DIFFERENT screen does NOT restore (that's an intentional move away). Keyed by id / data-stat /
// data-key, so only stably-identifiable fields are preserved (display-only inputs have none).
let LAST_NAV_KEY = null;
function _fieldKey(el) { return el.id || el.getAttribute("data-stat") || el.getAttribute("data-key") || ""; }
function snapshotFields(root) {
  const snap = {fields: {}, chips: []};
  root.querySelectorAll("input, textarea, select").forEach(el => {
    const key = _fieldKey(el); if (!key) return;
    snap.fields[key] = (el.type === "checkbox" || el.type === "radio") ? {checked: el.checked} : {value: el.value};
  });
  root.querySelectorAll(".chip[data-slot].on").forEach(el => snap.chips.push(el.getAttribute("data-slot")));
  return snap;
}
function restoreFields(root, snap) {
  if (!snap) return;
  root.querySelectorAll("input, textarea, select").forEach(el => {
    const s = snap.fields[_fieldKey(el)]; if (!s) return;
    if ("checked" in s) el.checked = s.checked; else el.value = s.value;
  });
  const on = new Set(snap.chips);
  root.querySelectorAll(".chip[data-slot]").forEach(el => el.classList.toggle("on", on.has(el.getAttribute("data-slot"))));
  if (root.querySelector("#fnbody") && typeof fnSyncGutter === "function") fnSyncGutter();  // keep line gutter in step
}
function render() {
  const app = document.getElementById("screen");
  const navKey = JSON.stringify(NAV.cur);
  const same = navKey === LAST_NAV_KEY;
  const snap = same ? snapshotFields(app) : null;  // preserve entries only on a same-screen redraw
  const prevPage = same ? app.querySelector(".page") : null;
  const scrollTop = prevPage ? prevPage.scrollTop : 0;   // .page is the scroll container — keep its position
  KEYMAP = {}; ADD_ACTION = null;
  document.getElementById("app").classList.toggle("menu", NAV.cur.kind === "menu");
  document.getElementById("backbtn").disabled = NAV.stack.length === 0;
  document.getElementById("crumb").textContent = crumbText();
  const k = NAV.cur.kind;
  try {   // a bad render must NEVER take down the console/footer — show an error card instead
    if (k === "menu")    app.innerHTML = renderMenu();
    else if (k === "picker") app.innerHTML = renderPicker();
    else if (k === "wheel")  app.innerHTML = renderWheel();
    else if (k === "inv")    app.innerHTML = renderInventory();
    else if (k === "item")   app.innerHTML = renderItemEditor();
    else if (k === "element") app.innerHTML = renderElementEditor();
    else if (k === "world")  app.innerHTML = renderWorld();
    else if (k === "worldsub") app.innerHTML = renderWorldSub();
    else if (k === "fnedit")   app.innerHTML = renderFnEditor();
    else app.innerHTML = renderSubpage();
    restoreFields(app, snap);
    if (same && scrollTop) { const np = app.querySelector(".page"); if (np) np.scrollTop = scrollTop; }
  } catch (e) {
    app.innerHTML = `<div class="page"><div class="card"><h3>render error (console still works)</h3>
      <span class="muted">${String(e && e.message || e)}</span></div></div>`;
    console.error("render error:", e);
  }
  LAST_NAV_KEY = navKey;
}
function crumbLabel(s) {
  if (s.kind === "menu") return "menu";
  if (s.kind === "picker") return "players";
  if (s.kind === "world") return "world";
  if (s.kind === "worldsub") return (WORLD_WHEEL.find(w => w.dest === s.dest) || {}).label || s.dest;
  if (s.kind === "fnedit") return s.path ? "edit fn" : "new fn";
  if (s.kind === "wheel") return s.player;
  if (s.kind === "inv") return "inventory";
  if (s.kind === "item") return s.item == null ? "new" : "editor";
  if (s.kind === "help") return "help";

}

// ---- PIE WHEEL (shared by the player wheel AND the player picker) ------------
// FORMULA: N segments fill the circle, each spanning 360/N degrees; segment 0 is CENTERED at the
// top (12 o'clock) and they go clockwise. The wedges run all the way to the centre; a hub circle is
// painted ON TOP for the centre button. N=1 -> one full disc; N=2 -> two half-circles; etc.
function pieWheel(segs, center) {
  // 100x100 viewBox, scaled to FIT the screen (preserveAspectRatio meet) so the WHOLE wheel shows,
  // zoomed out and centered (a circle can't fill a rectangle without cropping, so we letterbox).
  // rO ~49 keeps the wheel just inside the viewBox. center is optional — omit for no hub.
  const n = segs.length, w = 360 / n, cx = 50, cy = 50, rO = 49, rC = center ? 13 : 0, rL = 35;
  const P = (deg, r) => { const a = deg * Math.PI / 180; return [(cx + r * Math.sin(a)).toFixed(2), (cy - r * Math.cos(a)).toFixed(2)]; };
  let svg = "";
  segs.forEach((s, i) => {
    if (n === 1) {
      svg += `<circle cx="${cx}" cy="${cy}" r="${rO}" fill="${s.fill}" stroke="#14161a" stroke-width=".5" class="slice" onclick="${s.action}"/>`;
    } else {
      const [x1, y1] = P(i * w - w / 2, rO), [x2, y2] = P(i * w + w / 2, rO), big = w > 180 ? 1 : 0;
      const d = `M${cx} ${cy} L${x1} ${y1} A${rO} ${rO} 0 ${big} 1 ${x2} ${y2} Z`;
      svg += `<path d="${d}" fill="${s.fill}" stroke="#14161a" stroke-width=".5" class="slice" onclick="${s.action}"/>`;
    }
    const [lx, ly] = P(i * w, rL);
    const sub = s.sub ? `<tspan x="${lx}" dy="3.6" class="sub">${s.sub}</tspan>` : "";
    svg += `<text x="${lx}" y="${(ly - (s.sub ? 1.6 : 0)).toFixed(2)}" class="slabel"><tspan x="${lx}" class="ttl">${s.labelHTML}</tspan>${sub}</text>`;
  });
  if (center) {
    svg += `<circle cx="${cx}" cy="${cy}" r="${rC}" fill="#1b1e24" stroke="#3a4150" stroke-width=".5" class="slice"
              ${center.action ? `onclick="${center.action}"` : ""}/>`;
    svg += `<text x="${cx}" y="${cy}" class="clabel">${center.labelHTML}</text>`;
  }
  return `<div class="wheelwrap"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" id="wheelsvg">${svg}</svg></div>`;
}

// Assign each name a single-key accelerator: its first UNUSED letter. ONLY names that get no free
// letter fall back to a number — numbered 1,2,…,9,0 (keyboard row order), starting at 1 and assigned
// in order ONLY as needed (so the first letterless name is [1], not its position). After 0 (the 10th
// number) we run out — extra letterless names get no key. Returns [{name,key,isNum}].
const NUM_ROW = ["1","2","3","4","5","6","7","8","9","0"];
function assignKeys(names) {
  const usedLetters = new Set(), out = [];
  let numIdx = 0;
  for (const name of names) {
    let key = null, isNum = false;
    for (const ch of name.toLowerCase()) { if (/[a-z]/.test(ch) && !usedLetters.has(ch)) { key = ch; usedLetters.add(ch); break; } }
    if (!key && numIdx < NUM_ROW.length) { key = NUM_ROW[numIdx++]; isNum = true; }
    out.push({name, key, isNum});
  }
  return out;
}

// ---- PLAYER PICKER (Players -> choose who -> their wheel) ---------------------
// Reuses the pie wheel: each segment = a player OBJECT (title = object/variable name, subtitle =
// the character's {name:""}). No centre button (wedges meet at the centre).
function renderPicker() {
  const names = Object.keys(STATE.players);
  if (!names.length) return `<div class="page"><span class="muted">no players yet — try
     <b>/character new &lt;character&gt;</b> in the console.</span></div>`;
  const keyed = assignKeys(names);
  const segs = keyed.map((e, i) => {
    const p = STATE.players[e.name];
    const charName = (p.nbt && p.nbt.name) || "";
    const act = `go({kind:'wheel',player:'${e.name}'})`;
    if (e.key) KEYMAP[e.key] = () => go({kind: "wheel", player: e.name});  // only keys that were assigned
    // letter -> gold letter in the name; number fallback -> "[N] name" with N gold; none -> plain.
    const labelHTML = !e.key ? e.name
                     : e.isNum ? `[<tspan class="hk">${e.key}</tspan>] ${e.name}`
                     : hkSVG(e.name, e.key);
    return {labelHTML, sub: charName, fill: `hsl(${Math.round(i * 360 / names.length)} 40% 60%)`, action: act};
  });
  return pieWheel(segs, null);  // no centre hub
}

// ---- PLAYER WHEEL ------------------------------------------------------------
const WHEEL = [

// ---- GENERIC SUB-PAGES (stats/formulas/talents/abilities/effects/quests/nbt/storyline) ----
function card(title, inner) { return `<div class="card"><h3>${title}</h3>${inner}</div>`; }
function kv(obj, skipZero) {
  const rows = Object.entries(obj || {})
    .filter(([k, v]) => v !== null && v !== "" && !(skipZero && v === 0))
    .map(([k, v]) => `<div><span>${k}</span> <b>${typeof v === "object" ? JSON.stringify(v) : v}</b></div>`);
  return rows.length ? `<div class="kv">${rows.join("")}</div>` : `<span class="muted">—</span>`;
}
function pills(arr) { return (arr && arr.length) ? arr.map(s => `<span class="pill">${s}</span>`).join("") : `<span class="muted">none</span>`; }
// parse an element repr ("name{k:v,k2:[..],k3:"str"}") into {name, ...fields} for the cards.
function splitNbt(body) {
  const parts = []; let depth = 0, q = false, cur = "";
  for (let i = 0; i < body.length; i++) {
    const c = body[i];
    if (q) { cur += c; if (c === '"' && body[i - 1] !== "\\") q = false; continue; }
    if (c === '"') { q = true; cur += c; continue; }
    if (c === "[" || c === "{") { depth++; cur += c; continue; }
    if (c === "]" || c === "}") { depth--; cur += c; continue; }
    if (c === "," && depth === 0) { parts.push(cur); cur = ""; continue; }
    cur += c;
  }
  if (cur.trim()) parts.push(cur);
  return parts;
}
function parseRepr(repr) {
  const obj = {name: typeOf(repr)};
  const m = String(repr).match(/^[^{]*\{([\s\S]*)\}[^}]*$/);
  if (m) splitNbt(m[1]).forEach(p => {
    const i = p.indexOf(":"); if (i < 0) return;
    let k = p.slice(0, i).trim(), v = p.slice(i + 1).trim();
    if (v.startsWith('"') && v.endsWith('"')) v = v.slice(1, -1).replace(/\\"/g, '"');
    obj[k] = v;
  });
  return obj;
}
// equipment chip handler: toggle ONE item in/out of a slot (worn -> unequip that item; else equip it).
function toggleEquip(player, slot, id, worn) {
  send(worn ? `/item unequip ${player} ${id}` : `/item equip ${player} ${id} ${slot}`);
}
// edit a slot's body-coverage % (0–100). Accepts "12" or "12%"; sets the per-player override.
function covEdit(player, slot, raw) {
  let n = parseFloat(String(raw).replace(/[^0-9.\-]/g, ""));
  if (isNaN(n)) return;
  n = Math.max(0, Math.min(100, n));
  send(`/coverage ${player} ${slot} ${n}`);
}

function renderSubpage() {

  // '=' fires this slice's "+": open the element creator, or focus the new-stat box

    const etypeOf = {talents:"talent", abilities:"ability", effects:"effect", quests:"quest"};
    ADD_ACTION = () => go({kind: "element", player, etype: etypeOf[slice]});
  }
  else if (slice === "stats")
    ADD_ACTION = () => document.getElementById("newstat_name") && document.getElementById("newstat_name").focus();
  let body;
  if (slice === "stats") body = statsTab(p, NAV.cur.player);
  else if (slice === "flags") body = flagsTab(p, player);

  else if (slice === "effects") body = elementCards("effect", player, (p.effects || []).map(e => e.repr || ""));
  else if (slice === "quests") body = elementCards("quest", player, p.quests);

  else if (slice === "storyline") body = storylineTab(p, player);
  else body = card(slice, `<span class="muted">—</span>`);
  return `<div class="page">${body}</div>`;
}

// ---- STORYLINE (per-player log of what happened, by turn; + DM notes & last-turn summary) ----
// Minimal markdown: **bold**, *italic*, `code`, # headings, - lists, blank lines. Escapes HTML first.
function md(s) {
  s = escHTML(s);                          // escape first; markdown sigils (#,*,`,```) survive
  const out = []; let inCode = false, code = [];
  s.split("\n").forEach(l => {
    if (/^\s*```/.test(l)) {                // fenced code block
      if (inCode) { out.push(`<pre class="md-pre">${code.join("\n")}</pre>`); code = []; inCode = false; }
      else inCode = true;
      return;
    }
    if (inCode) { code.push(l); return; }
    const t = l.replace(/`([^`]+)`/g, "<code>$1</code>")
               .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>").replace(/\*([^*]+)\*/g, "<i>$1</i>");
    const h = t.match(/^(#{1,3})\s+(.*)$/);
    if (h) out.push(`<div class="md-h${h[1].length}">${h[2]}</div>`);
    else if (/^\s*[-*]\s+/.test(l)) out.push(`<div class="md-li">• ${t.replace(/^\s*[-*]\s+/, "")}</div>`);
    else out.push(t.trim() ? `<div>${t}</div>` : `<div class="md-sp"></div>`);
  });
  if (inCode && code.length) out.push(`<pre class="md-pre">${code.join("\n")}</pre>`);
  return out.join("");
}

// ---- FLAGS / PROCS tab -------------------------------------------------------
// Lists every talent/effect that has a proc, shows its trigger condition (AND within a clause,
// OR across clauses), and gives pulse / on / off buttons for each flag it watches.
function parseProc(procStr) {                 // "[{a:true,b:false}]" -> [{a:true,b:false}]
  if (!procStr || procStr === "None" || procStr === "[]") return [];
  return (String(procStr).match(/\{[^}]*\}/g) || []).map(g => {
    const cond = {};
    g.slice(1, -1).split(",").forEach(pair => {
      const [k, v] = pair.split(":");
      if (k && k.trim()) cond[k.trim()] = (v || "").trim() === "true";
    });
    return cond;
  }).filter(c => Object.keys(c).length);
}
function procDesc(clauses) {
  return clauses.map(c => Object.entries(c).map(([k, v]) => v ? k : `NOT ${k}`).join(" AND ")).join("   OR   ") || "—";
}
function flagControl(player, flag, on) {
  return `<span class="flagctl">
    <span class="flagname ${on ? "fon" : ""}">${flag}</span>
    <button title="pulse — fire once, then revert" onclick="send('/proc pulse ${player} ${flag}')">pulse</button>
    <button title="enable — sticky on" onclick="send('/proc enable ${player} ${flag}')">on</button>
    <button title="disable — off" onclick="send('/proc disable ${player} ${flag}')">off</button></span>`;
}
// every flag this player's talents/effects reference -> what it's connected to.
// talent proc = "triggers" the talent · effect proc = "pulsed by" the effect (on step turns) ·
// effect clear_when = this flag "clears" the effect.
// flags from EITHER clause format `[{a:true},{b:false}]` (talent proc / effect clear_when)
// OR a plain signal token list `[poison_tick:true, bleed]` (effect proc).
function flagsAny(str) {

             : (f === "proc" && kind === "effect") ? "signals to PULSE on step turns, e.g. poison_tick (comma-separated; [ ] auto-added)"
             : f === "proc" ? "{flag:true}   AND: {a:true,b:true}   OR: {a:true},{b:true}   (the [ ] are added for you)"
             : (kind === "effect" && f === "duration") ? "turns (e.g. 5) — OR a proc to clear on: hex_removed:true   (braces auto-added)"
             : (kind === "quest" && f === "expiration") ? "turns (e.g. 5) · a date M/D or Y/M/D · OR a proc: hex_lifted:true"
             : "";
    let val = f === "name" ? (editing || "") : clean(el[f]);
    if (kind === "effect" && f === "duration" && !val && el.clear_when && el.clear_when !== "None")
      val = String(el.clear_when).replace(/^\[|\]$/g, "");   // edit: show the clear-when proc in the duration/until field
    if (kind === "quest" && f === "expiration" && !val) {    // edit: surface a date/proc expiry in the single field
      if (el.expire_on && el.expire_on !== "None") val = String(el.expire_on);
      else if (el.expire_when && el.expire_when !== "None") val = String(el.expire_when).replace(/^\[|\]$/g, "");
    }
    const ro = (f === "name" && editing) ? " readonly title='the identifier is the lookup key — not editable'" : "";
    const ctl = EL_TEXTAREA.has(f)
      ? `<textarea id="el_${f}" rows="3" placeholder="${ph}"${ro}>${escHTML(val)}</textarea>`
      : `<input type="text" id="el_${f}" placeholder="${ph}" value="${escAttr(val)}"${ro}>`;
    return `<div class="elcell" style="flex:${w}"><label>${label}${f === "name" ? " *" : ""}</label>${ctl}</div>`;
  };
  const rows = layout.map(r => `<div class="elrow">${r.map(cell).join("")}</div>`).join("");
  const nbtRow = `<div class="elrow"><div class="elcell" style="flex:1"><label>nbt (extra fields)</label>
     <textarea id="el_custom" rows="2" placeholder="any extra fields — key:value, key2:value2"></textarea></div></div>`;
  if (kind === "quest") ensureQObj(el);
  ensureElHooks(el);
  const builder = kind === "quest" ? questBuilderHTML() : "";
  const verb = editing ? "Save" : "Create";
  const cmdWord = editing ? "modify" : "new";
  return `<div class="page">${card((editing ? "edit " : "new ") + kind,
    `<div class="eled">${rows}${elHooksHTML(kind)}${builder}${nbtRow}
       <div class="elactions"><button class="go" onclick="saveElement()">${verb} → stage command</button>
         <span class="hint">stages <code>/${kind} ${cmdWord}</code> — review, then Enter.${editing ? " (merges; blank fields are left unchanged)" : ""}</span></div>
       <div id="el_preview" class="hint" style="margin-top:6px"></div></div>`)}</div>`;
}
function saveElement() {
  const kind = NAV.cur.etype, player = NAV.cur.player, editing = NAV.cur.name || null;
  const g = (id) => ((document.getElementById(id) || {}).value || "").trim();
  const q = (s) => '"' + s.replace(/"/g, '\\"') + '"';
  const name = editing || g("el_name");
  const prev = document.getElementById("el_preview");
  if (!name) { prev.textContent = "the identifier (" + kind + ") is required."; return; }
  const nbt = {};
  elFields(kind).forEach(f => {
    if (f === "name") return;
    let val = g("el_" + f);
    if (!val) return;
    if (kind === "effect" && f === "duration" && !/^-?\d+$/.test(val)) {
      nbt["clear_when"] = wrapProc(val);         // not a turn count -> a proc condition to clear on
      return;
    }
    if (kind === "quest" && f === "expiration") {  // turns | a date (M/D, Y/M/D) | else a proc condition
      if (/^-?\d+$/.test(val)) nbt["expiration"] = val;
      else if (/^\d+\/\d+(\/\d+)?$/.test(val)) nbt["expire_on"] = val;
      else nbt["expire_when"] = wrapProc(val);
      return;
    }
    if (f === "proc") val = (kind === "effect") ? bracketList(val) : wrapProc(val);   // effect proc = signal list; talent proc = clauses
    nbt[f] = EL_FREETEXT.has(f) ? q(val) : val;
  });
  let body = Object.entries(nbt).map(([k, v]) => `${k}:${v}`).join(",");
  const custom = g("el_custom");
  if (custom) body = body ? body + "," + custom : custom;
  if (editing || ELHOOKS.length) body = (body ? body + "," : "") + "hooks:[" + ELHOOKS.join(",") + "]";  // attached 🪝 hooks
  const line = `/${kind} ${editing ? "modify" : "new"} ${player} ${name}{${body}}`;   // modify MERGES
  if (kind === "quest") {   // also stage the objectives: rebuild them (preserving each one's progress)
    const lines = [line];
    if (editing) lines.push(`/quest objective ${player} ${name} clear`);
    QOBJ.forEach((o, i) => {
      const lab = (o.label || "").trim() || "objective";
      lines.push(`/quest objective ${player} ${name} add ${o.type} ${lab}`);
      if (o.type === "segment" && o.goal) lines.push(`/quest objective ${player} ${name} ${i} goal ${o.goal}`);
      const toks = String(o.proc || "").replace(/[{}\[\]]/g, "").trim();
      if (toks) lines.push(`/quest objective ${player} ${name} ${i} proc ${toks}`);
      const cur = Number(o.current) || 0;
      if (cur) lines.push(`/quest objective ${player} ${name} ${i} set ${cur}`);
    });
    cmd.value = lines.join("\n"); cmd.focus();
    prev.innerHTML = `staged ${lines.length} line(s) — press Enter to run them in order.`;
    return;
  }
  cmd.value = line; cmd.focus();   // stage it; you press Enter to run (same as the item editor)
  prev.innerHTML = "staged — press Enter in the console: <b>" + line.replace(/</g, "&lt;") + "</b>";
}

// ---- ATLAS (the world map) ---------------------------------------------------
// A grid of cells colored by biome. Each cell: biome emblem (top-left), weather (top-right),
// a ▲ if structures sit here, entity dots. The entity's SHAPE is its own symbol; its COLOR is the
// VIEWPOINT player's allegiance toward it (ally/neutral/hostile). Fog is PER-PLAYER: Player view shows
// only the chosen viewpoint's discovered cells; DM view shows everything (cells nobody has explored
// are dimmed). Pick the viewpoint with the buttons in the bar.
function renderAtlas() {
  const map = STATE.map || {}, cells = map.cells || {};
  const biomes = STATE.biomes || {}, weather = STATE.weather || {};
  const keys = Object.keys(cells);
  if (!keys.length)
    return `<div class="page">${card("Atlas",
      `<span class="muted">no world yet — generate one in the console: <b>/map generate 12x8</b></span>`)}</div>`;
  let minx = 1e9, maxx = -1e9, miny = 1e9, maxy = -1e9;
  for (const k of keys) { const [x, y] = k.split(",").map(Number);
    minx = Math.min(minx, x); maxx = Math.max(maxx, x); miny = Math.min(miny, y); maxy = Math.max(maxy, y); }
  const entAt = {}, structAt = {};
  (STATE.entities || []).forEach(e => (entAt[e.x + "," + e.y] = entAt[e.x + "," + e.y] || []).push(e));
  (STATE.structures || []).forEach(s => { const p = s.pos || []; if (p.length >= 2)
    (structAt[p[0] + "," + p[1]] = structAt[p[0] + "," + p[1]] || []).push(s); });

  // player characters (not NPCs/mobs) = the possible viewpoints; pick the selected one or the first
  const playerNames = Object.keys(STATE.players).filter(n => { const nb = STATE.players[n].nbt || {}; return !nb.npc && !nb.mob; });
  const vp = (ATLAS_VIEW && STATE.players[ATLAS_VIEW]) ? ATLAS_VIEW : (playerNames[0] || null);
  const vpNbt = vp ? (STATE.players[vp].nbt || {}) : {};
  const vpAlleg = (vpNbt.allegiance && typeof vpNbt.allegiance === "object") ? vpNbt.allegiance : {};
  const playerView = MODE === "player";
  // fog is per-cell, persistent: cell.seen = players who've fully revealed it (BRIGHT), cell.dim = players
  // who've only glimpsed it (DIMMED, stays dim). Player view fogs by the viewpoint; DM sees everything.
  const seenByVp = (cell) => Array.isArray(cell.seen) && cell.seen.includes(vp);
  const dimByVp = (cell) => Array.isArray(cell.dim) && cell.dim.includes(vp);
  const dotColor = (e) => e.name === vp ? "#ffffff" : (ALLEGIANCE_COLOR[vpAlleg[e.name] || "neutral"] || ALLEGIANCE_COLOR.neutral);
  ATLAS_DATA = {cells, biomes, weather, entAt, structAt, vp, vpAlleg};
  const paintable = ATLAS_PAINT && vp;               // click-to-paint fog for the viewpoint player

  let rows = "";
  for (let y = miny; y <= maxy; y++) {
    let row = "";
    for (let x = minx; x <= maxx; x++) {
      const key = x + "," + y, cell = cells[key];
      if (!cell) { row += `<div class="acell avoid"></div>`; continue; }
      let dim = false;
      if (playerView) {                              // DM sees everything; player view fogs by the viewpoint
        if (seenByVp(cell)) {}                        // fully revealed -> bright
        else if (dimByVp(cell)) dim = true;           // glimpsed -> dim (persistent)
        else { row += `<div class="acell afog${paintable ? " apaint" : ""}"${paintable ? ` onclick="atlasPaint('${key}')"` : ""}></div>`; continue; }
      }
      const b = biomes[cell.biome] || {}, w = weather[key];
      const ents = entAt[key] || [], structs = structAt[key] || [];
      const wTint = ATLAS_OPT.weather && WEATHER_TINT[w] ? `<div class="aweather" style="background:${WEATHER_TINT[w]}"></div>` : "";
      const wGlyph = ATLAS_OPT.weather && w ? `<span class="aw">${WEATHER_GLYPH[w] || ""}</span>` : "";
      const sMark = ATLAS_OPT.structures && structs.length ? `<span class="astruct">▲</span>` : "";
      const dots = ATLAS_OPT.entities ? ents.map(e =>
        `<span class="adot" style="color:${dotColor(e)}">${e.symbol || ENT_DOT[e.kind] || "●"}</span>`).join("") : "";
      row += `<div class="acell${dim ? " adim" : ""}${paintable ? " apaint" : ""}" style="background:${b.color || "#333"}"
                ${paintable ? `onclick="atlasPaint('${key}')"` : ""}
                onmouseover="atlasHover(event,'${key}')" onmousemove="atlasMove(event)" onmouseout="atlasOut()">
                ${wTint}<span class="abio">${b.glyph || ""}</span>${wGlyph}${sMark}
                <span class="aents">${dots}</span></div>`;
    }
    rows += `<div class="arow">${row}</div>`;
  }
  const opt = (k, label) => `<button class="fnbtn${ATLAS_OPT[k] ? " on" : ""}" onclick="ATLAS_OPT.${k}=!ATLAS_OPT.${k};render()">${label}</button>`;
  const vpBtns = playerNames.length
    ? `<span class="atlasgroup"><span class="atlaslbl">viewpoint</span>${playerNames.map(n =>
        `<button class="fnbtn${n === vp ? " on" : ""}" onclick="ATLAS_VIEW='${n.replace(/'/g, "\\'")}';render()">${escHTML(n)}</button>`).join("")}</span>`
    : "";
  const paintGrp = vp
    ? `<span class="atlasgroup"><span class="atlaslbl">paint ${escHTML(vp)}'s fog</span>${["reveal", "dim", "hide"].map(m =>
        `<button class="fnbtn${ATLAS_PAINT === m ? " on" : ""}" onclick="ATLAS_PAINT = ATLAS_PAINT === '${m}' ? null : '${m}'; render()">${m}</button>`).join("")}</span>`
    : "";

      ${vpBtns}
      <button class="fnbtn" onclick="send('/map view')" title="also print to the console">console</button>
    </div>
    <div class="atlasbar">${paintGrp}${paintable ? `<span class="muted">click a tile to ${ATLAS_PAINT} it for ${escHTML(vp)}</span>` : ""}</div>
    <div class="atlasmode muted">${playerView
        ? (vp ? `🎭 player view — ${escHTML(vp)}'s fog (bright = revealed · dim = glimpsed) &amp; allegiances` : "🎭 player view — no player characters yet")
        : `👑 DM view — full map (hover a tile for who's been there)${vp ? `; colors from ${escHTML(vp)}'s allegiances` : ""}`}
      <span class="atlaslegend"> · <span style="color:${ALLEGIANCE_COLOR.ally}">●</span> ally <span style="color:${ALLEGIANCE_COLOR.neutral}">●</span> neutral <span style="color:${ALLEGIANCE_COLOR.hostile}">●</span> hostile</span></div>`;
  return `<div class="page atlaspage">${bar}<div class="atlasgrid">${rows}</div><div id="atlastip" class="atlastip"></div></div>`;
}

  const vp = ATLAS_DATA && ATLAS_DATA.vp;

// ---- CALENDAR ----------------------------------------------------------------
// Backend-driven (STATE.calendar). A day-clock for the day's turns; then a grid of day boxes. Each
// box = day number + a "+" to add a note + a scrollable body of TURNS_PER_DAY turn-rows. Each row has
// the turn tick, any player pawns sitting on that turn (today only), and colored events at that turn:
// effect expiries, quest expiries, and manual notes (/calendar event).
function dayClock(tod, n) {
  const cx = 40, cy = 40, r = 33, parts = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * 2 * Math.PI - Math.PI / 2, on = i === tod;
    const x1 = cx + (r - 5) * Math.cos(a), y1 = cy + (r - 5) * Math.sin(a), x2 = cx + r * Math.cos(a), y2 = cy + r * Math.sin(a);
    const lx = cx + (r - 13) * Math.cos(a), ly = cy + (r - 13) * Math.sin(a) + 2.2;
    parts.push(`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" class="ctick ${on ? "con" : ""}"/>`);
    parts.push(`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" class="cnum ${on ? "con" : ""}">${i + 1}</text>`);
  }
  const a = (tod / n) * 2 * Math.PI - Math.PI / 2;
  const hx = cx + (r - 12) * Math.cos(a), hy = cy + (r - 12) * Math.sin(a);
  return `<div class="dayclock"><svg viewBox="0 0 80 80">
    <circle cx="${cx}" cy="${cy}" r="${r}" class="cface"/>${parts.join("")}
    <line x1="${cx}" y1="${cy}" x2="${hx.toFixed(1)}" y2="${hy.toFixed(1)}" class="chand"/>
    <circle cx="${cx}" cy="${cy}" r="2.5" class="chub"/></svg></div>`;
}
// a note chip: click to edit inline (text input + save/delete/cancel). save & delete STAGE the

function noteChip(n) {

      <button class="nbtn save" title="save — stages the command" onclick="saveNoteEdit(${n.id})">✓</button>
      <button class="nbtn ndel" title="delete — stages the command" onclick="deleteNote(${n.id})">🗑</button>
      <button class="nbtn ncancel" title="cancel — nothing staged" onclick="cancelNoteEdit()">✕</button></span>`;
  }
  return `<span class="calev ev-note editable" title="click to edit" onclick="editNote(${n.id})">${escHTML(n.text)}</span>`;
}
function editNote(id) { EDIT_NOTE = id; render(); const i = document.getElementById("noteinput"); if (i) { i.focus(); i.select(); } }

function ordinal(n) { const s = ["th", "st", "nd", "rd"], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }
// inline note creator (after clicking a day's "+"): pick a turn (or all-day) then type + add.
function noteCreator(month, day, TPD) {

function calDayBox(d, c, monthNum, pawnsByTurn, isCurrentMonth) {
  const TPD = c.turns_per_day, isToday = isCurrentMonth && d.day === c.today;
  const adding = CAL_ADD && CAL_ADD.month === monthNum && CAL_ADD.day === d.day;
  const allDay = d.notes.filter(n => n.turn == null).map(noteChip).join("");

    d.notes.filter(n => n.turn === t).forEach(n => evs.push(noteChip(n)));

    ${adding ? noteCreator(monthNum, d.day, TPD) : ""}

// ---- FUNCTIONS (folder tree of /function paths) ------------------------------
// Paths use ':' and '/' as separators — BOTH render as folder delimiters. Nodes are keyed by their
// full prefix string, so 'a:b' and 'a/b' stay distinct (they're different functions). Every row keeps
// run/edit buttons in a fixed left column so they stay aligned no matter how deep the tree node sits.
function escHTML(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function splitFuncPath(path) {                 // 'name:talents/death' -> [{seg:'name',delim:''},{seg:'talents',delim:':'},{seg:'death',delim:'/'}]
  const parts = String(path).split(/([:/])/);  // ['name',':','talents','/','death']
  const out = [{seg: parts[0], delim: ""}];
  for (let i = 1; i < parts.length; i += 2) out.push({delim: parts[i], seg: parts[i + 1] || ""});
  return out;
}
function buildFuncTree(funcs) {
  const root = {children: {}, order: []};
  Object.keys(funcs).sort().forEach(path => {
    let node = root, prefix = "";
    splitFuncPath(path).forEach(({seg, delim}) => {
      prefix = prefix ? prefix + delim + seg : seg;
      if (!node.children[prefix]) { node.children[prefix] = {seg, delim, prefix, children: {}, order: [], isFunc: false}; node.order.push(prefix); }
      node = node.children[prefix];
    });
    node.isFunc = true;   // the full path IS a real function (vs an intermediate folder)
  });
  return root;
}
function funcRowHTML(node, guide) {
  const path = node.prefix;
  const buttons = node.isFunc
    ? `<button class="fnbtn run" title="run — /function run ${path}" onclick="send('/function run ${path}')">▶</button>
       <button class="fnbtn edit" title="edit" onclick="go({kind:'fnedit',path:'${path}'})">✎</button>
       <button class="fnbtn del" title="delete — stages the command; press Enter to confirm"
         onclick="cmd.value='/function remove ${path}'; cmd.focus()">🗑</button>`
    : `<span class="fnspacer"></span>`;
  const seg = `<span class="fnseg ${node.isFunc ? "" : "fnfolder"}">${node.delim ? `<span class="fndelim">${node.delim}</span>` : ""}${escHTML(node.seg)}</span>`;
  return `<div class="fnrow"><span class="fnbtns">${buttons}</span><span class="fntree">${guide}${seg}</span></div>`;
}
function funcRows(funcs) {
  const root = buildFuncTree(funcs), rows = [];
  (function walk(node, bars) {                 // bars[i] = ancestor at depth i has more siblings (draw │)
    node.order.forEach((k, i) => {
      const child = node.children[k], last = i === node.order.length - 1;
      let guide = "";
      if (bars.length) {                        // depth >= 1 gets connectors; top level has none
        guide = bars.slice(0, -1).map((b, idx) => (b && idx > 0) ? '<span class="fgbar">│</span>  ' : "   ").join("");
        guide += `<span class="fgbar">${last ? "└─" : "├─"}</span> `;
      }
      rows.push(funcRowHTML(child, guide));
      walk(child, bars.concat([!last]));
    });
  })(root, []);
  return rows;
}
function renderFunctions() {
  const funcs = STATE.functions || {};
  ADD_ACTION = () => go({kind: "fnedit", path: null});
  const add = `<span class="addchip" onclick="go({kind:'fnedit',path:null})">＋ new function</span>`;
  const body = Object.keys(funcs).length
    ? `<div class="fntreebox">${funcRows(funcs).join("")}</div>`
    : `<span class="muted">no functions yet — press <b>+</b> to write one.</span>`;
  return `<div class="page">${card("Functions", add + body)}</div>`;
}

// ---- FUNCTION EDITOR (numbered-rows document) --------------------------------
function renderFnEditor() {
  const path = NAV.cur.path, funcs = STATE.functions || {};
  const body = (path && funcs[path] || []).join("\n");
  const nLines = Math.max(1, body.split("\n").length);
  return `<div class="page">${card(path ? "edit function" : "new function",
    `<div class="fneditor">
       <div class="row"><label class="f">path</label>
         <input id="fn_path" class="fnpath" placeholder="path — e.g. name:talents/death" value="${escHTML(path || "")}"></div>
       <div class="fndoc">
         <div class="fngutter" id="fngutter">${fnGutterHTML(nLines)}</div>
         <textarea id="fnbody" class="fnbodyta" spellcheck="false"
           oninput="fnSyncGutter();fnShowAC()" onclick="fnShowAC()" onkeyup="fnCaretKey(event)"
           onkeydown="fnKey(event)" onscroll="fnSyncScroll()" onblur="setTimeout(fnHideAC,120)"
           placeholder="one command per line — each line autocompletes like the console, e.g.&#10;/tellraw @s hello&#10;/stat modify @s health add 5">${escHTML(body)}</textarea>
       </div>
       <div id="fnac" class="fnac"></div>
       <div class="elactions"><button class="go" onclick="saveFunction()">Save</button>

function fnGutterHTML(n) {   // each line number is clickable -> selects that whole row in the textarea
  return Array.from({length: n}, (_, i) =>
    `<div class="fnln" onmousedown="event.preventDefault();fnSelectLine(${i})">${i + 1}</div>`).join("");
}
function fnSyncGutter() {
  const ta = document.getElementById("fnbody"), g = document.getElementById("fngutter");
  if (!ta || !g) return;
  g.innerHTML = fnGutterHTML(Math.max(1, ta.value.split("\n").length));
  g.scrollTop = ta.scrollTop;
}
function fnSyncScroll() {
  const ta = document.getElementById("fnbody"), g = document.getElementById("fngutter");
  if (ta && g) g.scrollTop = ta.scrollTop;
}
// click a gutter number -> select the WHOLE line (incl. its trailing newline, except the last line)
// so you can immediately Delete / Ctrl-X the row.
function fnSelectLine(idx) {
  const ta = document.getElementById("fnbody"); if (!ta) return;
  const lines = ta.value.split("\n");
  idx = Math.max(0, Math.min(idx, lines.length - 1));
  let start = 0;
  for (let i = 0; i < idx; i++) start += lines[i].length + 1;
  const end = idx < lines.length - 1 ? start + lines[idx].length + 1 : start + lines[idx].length;
  ta.focus(); ta.setSelectionRange(start, end);
  fnHideAC();
}

// ---- per-line autofill: every textarea line completes like a fresh console line ----
let fnAcItems = [], fnAcSel = -1, _fnCW = 0;
function fnAc() { return document.getElementById("fnac"); }
function fnAcOpen() { const b = fnAc(); return b && b.style.display === "block"; }
function fnHideAC() { const b = fnAc(); if (b) b.style.display = "none"; fnAcItems = []; fnAcSel = -1; }
function fnCurToken(ta) { return ta.value.slice(0, ta.selectionStart).split(/[ {,>\n]/).pop(); }
function fnCharWidth(font) {
  if (_fnCW) return _fnCW;
  const s = document.createElement("span");
  s.style.cssText = "position:absolute;visibility:hidden;white-space:pre"; s.style.font = font;
  s.textContent = "M".repeat(20); document.body.appendChild(s);
  _fnCW = s.getBoundingClientRect().width / 20; document.body.removeChild(s);
  return _fnCW;
}
async function fnShowAC() {
  const ta = document.getElementById("fnbody"), box = fnAc();
  if (!ta || !box) return;
  const before = ta.value.slice(0, ta.selectionStart);
  const line = before.slice(before.lastIndexOf("\n") + 1);   // the current line, up to the caret
  if (!line.trim()) return fnHideAC();
  fnAcItems = await (await fetch("/complete?line=" + encodeURIComponent(line))).json();
  if (!fnAcItems.length) return fnHideAC();
  fnAcSel = -1;
  box.innerHTML = fnAcItems.map((c, i) => `<div onmousedown="event.preventDefault();fnAcceptAC(${i})">${escHTML(c)}</div>`).join("");
  const cs = getComputedStyle(ta), lh = parseFloat(cs.lineHeight) || 19.5, cw = fnCharWidth(cs.font);
  const lineIdx = (before.match(/\n/g) || []).length, col = ta.selectionStart - (before.lastIndexOf("\n") + 1);
  box.style.top = (ta.offsetTop + (parseFloat(cs.paddingTop) || 8) + (lineIdx + 1) * lh - ta.scrollTop) + "px";
  box.style.left = (ta.offsetLeft + (parseFloat(cs.paddingLeft) || 10) + col * cw - ta.scrollLeft) + "px";
  box.style.display = "block";
}
function fnMoveSel(d) {
  fnAcSel = (fnAcSel + d + fnAcItems.length) % fnAcItems.length;
  [...fnAc().children].forEach((el, i) => el.className = i === fnAcSel ? "sel" : "");
}
function fnReplaceToken(s, addSpace) {
  const ta = document.getElementById("fnbody"), caret = ta.selectionStart;
  const tok = ta.value.slice(0, caret).split(/[ {,>\n]/).pop(), start = caret - tok.length;
  const ins = s + (addSpace ? " " : "");
  ta.value = ta.value.slice(0, start) + ins + ta.value.slice(caret);
  const pos = start + ins.length;
  ta.focus(); ta.setSelectionRange(pos, pos); fnSyncGutter();
}
function fnAcceptAC(i) { if (fnAcItems[i] == null) return; fnReplaceToken(fnAcItems[i], true); fnHideAC(); fnShowAC(); }
function fnTab() {
  if (!fnAcItems.length) return;
  if (fnAcSel >= 0) return fnAcceptAC(fnAcSel);
  if (fnAcItems.length === 1) return fnAcceptAC(0);
  const lcp = commonPrefix(fnAcItems), ta = document.getElementById("fnbody");
  if (lcp.length > fnCurToken(ta).length) { fnReplaceToken(lcp, false); fnShowAC(); return; }
  fnMoveSel(1);
}
function fnKey(e) {                            // Tab/arrows/Enter/Esc while the popup is open
  if (e.key === "Tab") { e.preventDefault(); fnTab(); return; }
  if (!fnAcOpen()) return;
  if (e.key === "ArrowDown") { e.preventDefault(); fnMoveSel(1); }
  else if (e.key === "ArrowUp") { e.preventDefault(); fnMoveSel(-1); }
  else if (e.key === "Enter" && fnAcSel >= 0) { e.preventDefault(); fnAcceptAC(fnAcSel); }   // else Enter = newline
  else if (e.key === "Escape") { e.preventDefault(); fnHideAC(); }
}
function fnCaretKey(e) {                        // arrow/click caret moves refresh the suggestions
  if (["ArrowLeft", "ArrowRight", "Home", "End"].includes(e.key)) fnShowAC();
}
async function saveFunction() {
  const path = ((document.getElementById("fn_path") || {}).value || "").trim().split(/\s+/)[0];
  const prev = document.getElementById("fn_preview");
  if (!path) { prev.textContent = "path is required."; return; }
  const body = ((document.getElementById("fnbody") || {}).value || "").split("\n").map(s => s.trim()).filter(Boolean);
  await runOne(`/function edit ${path}\n${body.join("\n")}`);   // ONE POST — runOne doesn't split on newlines (runCmd would)
  back();                                                       // return to the functions list (it re-renders from the fresh STATE)
}

// ---- INVENTORY ---------------------------------------------------------------
const ARMOR = new Set(["helmet","pauldrons","chestplate","gauntlets","poleyn","graves","rerebrace","vambrace","leggings","sabatons"]);
const CLOTHING = new Set(["tunic","robe","pants","socks"]);
function slotCat(s) { return ARMOR.has(s) ? "armor" : CLOTHING.has(s) ? "clothing" : "accessories"; }
const HANDS = ["main_hand", "off_hand"];
// the item's icon is whatever emoji/unicode you typed in the editor (nbt `emoji`); blank if none.
function emojiFor(repr) { return nbtVal(repr, "emoji"); }
function typeOf(repr) { return repr.split("{")[0]; }

function renderInventory() {
  const p = STATE.players[NAV.cur.player], player = NAV.cur.player;
  ADD_ACTION = () => go({kind: "item", player, item: null});   // '=' -> new item
  const slotCaps = (p.nbt && p.nbt.equip_slots) || {};         // slot -> capacity (race-seeded)
  const equipped = p.equipment || {};                          // slot -> [reprs]
  const allSlots = Array.from(new Set([...Object.keys(slotCaps), ...Object.keys(equipped)]));
  // group worn slots into the three colour zones (hand slots handled in the weapons block)
  const zones = {armor: [], accessories: [], clothing: []};
  for (const slot of allSlots) {
    if (HANDS.includes(slot)) continue;
    (zones[slotCat(slot)]).push(slot);
  }
  const invItems = p.items || [];
  // each item's command id is its UUID (exact — handles spaces + duplicate names); label is name||type.
  const refOf = (r) => ({label: nbtVal(r, "name") || typeOf(r), uuid: nbtVal(r, "uuid")});
  // one equipment chip: worn (gold box = click to unequip) | available (click to equip) | dimmed if full.
  const chipFor = (slot, ref, worn, full) =>
    `<span class="chip${worn ? " on" : (full ? " full" : "")}" title="${worn ? "unequip" : full ? "slot full" : "equip"} (${ref.uuid})"
      ${(worn || !full) ? `onclick="toggleEquip('${player}','${slot}','${ref.uuid}',${worn ? 1 : 0})"` : ""}><span class="box"></span>${ref.label}</span>`;
  // body-coverage % (the slot TYPE's share of the body): per-player override, else the body_coverage.csv default.
  const covOf = (slot) => {
    const o = (p.nbt && p.nbt.coverage) || {}, g = STATE.body_coverage || {};
    if (o[slot] != null) return Number(o[slot]) || 0;
    const norm = slot.toLowerCase().replace(/s$/, "");
    return Number(g[slot] != null ? g[slot] : (g[norm] != null ? g[norm] : 0)) || 0;
  };
  const capOf = (slot) => { const c = slotCaps[slot]; return (c != null ? Number(c) : (equipped[slot] || []).length) || 1; };
  const trim = (n) => Math.round(n * 100) / 100;   // up to 2 decimals (e.g. 2/3 = 0.67, 12/4 = 3)
  // editable 00% field + a proportion bar; the type % is SPLIT across the slot's instances (capacity):
  // 12% over 2 vambraces -> 6% each; over 4 (four-armed) -> 3% each. The split shows as a bare gray %.
  const covCell = (slot) => { const c = covOf(slot), cap = capOf(slot), per = trim(c / cap);
    const split = cap > 1 ? `<span class="covper" title="${per}% each — ${c}% split across ${cap}">${per}%</span>` : "";
    return `<div class="covcell" title="${slot}: ${c}% of the body (this slot's whole share)">
      <div class="covtop"><input class="covinput" value="${c}%" title="body coverage 0–100%"
        onkeydown="if(event.key==='Enter'){covEdit('${player}','${slot}',this.value);}" onblur="covEdit('${player}','${slot}',this.value)">${split}</div>
      <div class="covbar"><span class="covfill" style="width:${Math.max(0, Math.min(100, c))}%"></span></div></div>`; };
  // a slot row: one chip per worn item + one per inventory item that fits — toggle each individually (capacity-aware).
  const slotRow = (slot, candReprs) => {
    const cap = capOf(slot);
    const wornReprs = equipped[slot] || [], wornUuids = new Set(wornReprs.map(r => nbtVal(r, "uuid")));
    const full = wornReprs.length >= cap;
    const offer = candReprs.filter(r => !wornUuids.has(nbtVal(r, "uuid")));
    const chips = wornReprs.map(r => chipFor(slot, refOf(r), true, full)).join("")
                + offer.map(r => chipFor(slot, refOf(r), false, full)).join("");
    return `<div class="slotrow">${covCell(slot)}<label>${slot} (${wornReprs.length}/${cap})</label>
       <div class="chips">${chips || `<span class="muted">—</span>`}</div></div>`;
  };
  const fitsSlot = (slot) => invItems.filter((r, i) => nbtList(invItems[i], "equippable").includes(slot));
  const zone = (cat) => {   // a category's coverage should total 100% — show the running sum, flag it when it isn't
    const total = trim(zones[cat].reduce((a, s) => a + covOf(s), 0));
    const tot = zones[cat].length ? `<span class="zonetot ${Math.round(total) !== 100 ? "bad" : ""}">— ${total}%</span>` : "";
    return `<div class="zone ${cat}"><h4>${cat} ${tot}</h4>${
      zones[cat].length ? zones[cat].map(s => slotRow(s, fitsSlot(s))).join("") : `<span class="muted">no ${cat} slots</span>`}</div>`;
  };

  // weapons: candidates = inventory items whose `wield` matches this hand (equip routes by the item's wield).
  const wieldFits = (slot) => { const want = slot === "main_hand" ? ["main", "both"] : ["off", "both"];
    return invItems.filter(r => want.includes(nbtVal(r, "wield"))); };
  const handRow = (slot) => slotRow(slot, wieldFits(slot));
  const extraHands = allSlots.filter(s => s.includes("hand") && !HANDS.includes(s));

  // radar charts — wired to the player's LIVE stats (these keys already exist in the backend).
  const S = p.stats || {}, v = (k) => Number(S[k] || 0);
  const radars = [
    radar("Physical Damage", ["Bludgeon","Slash","Pierce"], [v("bludgeon"),v("slash"),v("pierce")], null, "#d98a8a", "#c0392b"),
    radar("Physical Penetration", ["Bludgeon","Slash","Pierce"],
          [v("bludgeon_penetration"),v("slash_penetration"),v("pierce_penetration")], null, "#e0b27a", "#b8702a"),
    radar("Magical Damage", ["Arcana","Aether","Ethereal","Ichor"],
          [v("arcana"),v("aether"),v("ethereal"),v("ichor")], null, "#b9a8d8", "#6a4fb5"),
    radar("Physical Resistance", ["Bludgeon","Slash","Pierce"],
          [v("bludgeon_resistance"),v("slash_resistance"),v("pierce_resistance")], null, "#8aa9d9", "#2c6fb5"),
    radar("Magical Ward", ["Ichor","Arcana","Aether","Ethereal"],
          [v("ichor_ward"),v("arcana_ward"),v("aether_ward"),v("ethereal_ward")], null, "#8fc3a8", "#2f8f63"),
  ].join("");

  return `<div class="page"><div class="invgrid">
    <div>
      <div class="card"><h3>Equipment</h3>${zone("armor")}${zone("accessories")}${zone("clothing")}</div>
      <div class="card"><h3>Weapons</h3>${handRow("main_hand")}${handRow("off_hand")}${
        extraHands.map(handRow).join("")}</div>
    </div>
    <div>
      <div class="card"><h3>Gear Stats</h3>
        <div class="radars">${radars}</div>
        <div class="flatbox" style="margin-top:8px"><h3 style="margin:0 0 6px">Flat Defense</h3>
          ${kv({"armor class": v("armor_class"), "defense": v("defense")})}
          </div>
      </div>
    </div>
  </div>
  <div class="card"><h3>Items <span class="addchip" style="margin-left:8px;font-size:13px;padding:3px 10px"
      onclick="invNewContainer('${player}')">＋ container</span></h3>${renderGridInventory(p, player)}</div>
  </div>`;
}

// ==== GRID INVENTORY (containers + drag/rotate + loose bin) ====================
const GCELL = 30, GGAP = 3, GSTEP = GCELL + GGAP;   // px per cell + gap
function parsePos(repr) {   // pos:{c:base,x:2,y:0,r:90} -> {c,x,y,r} (null if unplaced)
  const inner = nbtDict(repr, "pos");
  if (!inner.c && inner.x == null && inner.y == null) return null;
  const strip = (v) => String(v == null ? "" : v).replace(/^"|"$/g, "");
  return {c: strip(inner.c), x: parseInt(inner.x) || 0, y: parseInt(inner.y) || 0, r: parseInt(inner.r) || 0};
}
function rotateCells(cells, rot) {   // turn a [[r,c]...] footprint by rot°, re-normalized to origin 0,0

let INVDRAG = null;
function invDragStart(ev, player, uuid) {

  const pos = parsePos(repr), rot = pos ? pos.r : 0;

    const rect = host.getBoundingClientRect();
    const gr = Math.floor((ev.clientY - rect.top) / GSTEP), gc = Math.floor((ev.clientX - rect.left) / GSTEP);
    const rcells = rotateCells(cells, rot);

  document.addEventListener("mouseup", invDragEnd);
  document.addEventListener("keydown", invDragKey);
}

  g.innerHTML = cells.map(([r, c]) =>
    `<div class="gicell" style="left:${c * GSTEP}px;top:${r * GSTEP}px;width:${GCELL}px;height:${GCELL}px"></div>`).join("");
  g.style.left = (ev.clientX + 6) + "px"; g.style.top = (ev.clientY + 6) + "px";

}

  const occ = new Set();

    if (dist < bestDist) { bestDist = dist; best = {x, y}; }

// radar chart as inline SVG (no libraries). max=null -> auto-scale to the largest value.
function radar(title, labels, values, max, stroke, fill) {
  if (max == null) max = Math.max(1, ...values);
  const n = labels.length, cx = 110, cy = 108, R = 64;
  const pt = (i, r) => { const a = (i / n) * 2 * Math.PI - Math.PI / 2; return [cx + r * Math.cos(a), cy + r * Math.sin(a)]; };
  let g = "";
  for (let ring = 1; ring <= 3; ring++) {
    const pts = labels.map((_, i) => pt(i, R * ring / 3).map(v => v.toFixed(1)).join(",")).join(" ");
    g += `<polygon points="${pts}" fill="none" stroke="#00000022"/>`;
  }
  labels.forEach((lab, i) => {
    const [x, y] = pt(i, R), [lxx, lyy] = pt(i, R + 14);
    g += `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#00000022"/>`;
    g += `<text x="${lxx.toFixed(1)}" y="${lyy.toFixed(1)}" font-size="8" fill="#333" text-anchor="middle">${lab}</text>`;
  });
  const poly = values.map((v, i) => pt(i, R * Math.max(0, Math.min(1, v / max))).map(c => c.toFixed(1)).join(",")).join(" ");
  g += `<polygon points="${poly}" fill="${fill}33" stroke="${stroke}" stroke-width="2"/>`;
  return `<div class="radar" style="background:${stroke}22"><div class="t">${title}</div>
    <svg viewBox="0 0 220 200" width="100%">${g}</svg></div>`;
}

  return parts.map(x => x.trim()).filter(Boolean);
}
function ensureIGrants(repr) {
  const key = NAV.cur.player + "/" + (NAV.cur.item == null ? "new" : NAV.cur.item);
  if (IGRANTS_FOR === key) return;
  IGRANTS = [];
  const load = (field, trigger) => _splitTop(_bracketInner(repr || "", field)).forEach(ch => {
    let kind = ch.slice(0, ch.indexOf(":")).trim().toLowerCase(), spec;
    if (GRANT_KINDS.includes(kind)) spec = ch.slice(ch.indexOf(":") + 1).trim();
    else { kind = "talent"; spec = ch.trim(); }       // bare 'fireproof' -> talent
    IGRANTS.push({trigger, kind, spec});
  });
  load("grants", "equipped"); load("while_held", "held");
  IGRANTS_FOR = key;
}
function igrantRowHTML(g, i) {
