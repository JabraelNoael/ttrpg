  return `<div class="qbrow">
    <select class="igtrig" title="when it applies" onchange="igrantEdit(${i},'trigger',this.value)">${sel(g.trigger, [["equipped", "while equipped"], ["held", "while held"]])}</select>
    <select class="igkind" title="element type" onchange="igrantEdit(${i},'kind',this.value)">${sel(g.kind, GRANT_KINDS)}</select>
    <input class="igspec" value="${escAttr(g.spec)}" placeholder="${g.kind === "flag" ? "flag, e.g. blessed:true" : "name, e.g. fireproof  ·  zap{cooldown:2}"}" oninput="igrantEdit(${i},'spec',this.value)">
    <button class="qbdel" title="remove" onclick="igrantDel(${i})">✕</button></div>`;
}
function renderIGrants() { const b = document.getElementById("ie_grants"); if (b) b.innerHTML = IGRANTS.map(igrantRowHTML).join(""); }
function igrantEdit(i, f, v) { if (!IGRANTS[i]) return; IGRANTS[i][f] = v; if (f === "kind") renderIGrants(); }
function igrantAdd() { IGRANTS.push({trigger: "equipped", kind: "talent", spec: ""}); renderIGrants(); }
function igrantDel(i) { IGRANTS.splice(i, 1); renderIGrants(); }
function igrantsHTML() {
  return `<div class="sub"><h4>grants — elements while held / worn (live)</h4>
    <div class="hint">give the holder a talent / ability / effect / quest, or hold a flag ON — only while this item is in their inventory (held) or in a slot (equipped). Auto-revoked when lost/unequipped.</div>
    <div id="ie_grants">${IGRANTS.map(igrantRowHTML).join("")}</div>
    <span class="addchip" onclick="igrantAdd()">＋ grant</span></div>`;
}
// ---- item SHAPE editor (grid footprint) -------------------------------------
// IE_SHAPE = a Set of "r,c" cells (relative; origin 0,0 is the center). Empty = the item takes
// NO grid space (lives in the loose bin). The grid always shows a 1-cell pad around the selection
// so you can expand in any direction; on save the cells are normalized so min r = min c = 0.
let IE_SHAPE = new Set();
function parseCells(inner) {   // "[0, 0],[1, 0]" -> [[0,0],[1,0]]
  const out = []; const re = /\[\s*(-?\d+)\s*,\s*(-?\d+)\s*\]/g; let m;
  while ((m = re.exec(inner))) out.push([parseInt(m[1]), parseInt(m[2])]);
  return out;
}
function ensureIeShape(repr) {
  IE_SHAPE = new Set();
  const cells = parseCells(_bracketInner(repr, "shape"));
  if (cells.length) cells.forEach(([r, c]) => IE_SHAPE.add(r + "," + c));
  else if (!repr) IE_SHAPE.add("0,0");   // new item starts as a single center cell; editing an existing
}                                          // shape-less item stays empty (no footprint)
function ieToggleCell(r, c) {
  const k = r + "," + c;
  if (IE_SHAPE.has(k)) IE_SHAPE.delete(k); else IE_SHAPE.add(k);
  renderIeShape();
}
function ieShapeBounds() {
  const rs = [0], cs = [0];
  IE_SHAPE.forEach(k => { const [r, c] = k.split(",").map(Number); rs.push(r); cs.push(c); });
  return {r0: Math.min(...rs) - 1, r1: Math.max(...rs) + 1, c0: Math.min(...cs) - 1, c1: Math.max(...cs) + 1};
}
function ieShapeHTML() {
  const b = ieShapeBounds(), cols = b.c1 - b.c0 + 1, cells = [];
  for (let r = b.r0; r <= b.r1; r++) for (let c = b.c0; c <= b.c1; c++) {
    const sel = IE_SHAPE.has(r + "," + c), center = (r === 0 && c === 0);
    cells.push(`<div class="shcell${sel ? " on" : ""}${center ? " ctr" : ""}" onclick="ieToggleCell(${r},${c})"></div>`);
  }
  return `<div class="shgrid" style="grid-template-columns:repeat(${cols},22px)">${cells.join("")}</div>`;
}
function ieShapeBoxInner() {
  const n = IE_SHAPE.size;
  return ieShapeHTML() + `<div class="hint" style="margin-top:6px">${
    n ? `footprint: ${n} cell${n > 1 ? "s" : ""}` : "no footprint — this item lives in the loose bin (takes no grid space)"}</div>`;
}
function renderIeShape() {
  const box = document.getElementById("ie_shapebox");
  if (box) box.innerHTML = ieShapeBoxInner();
}
function ieShapeNbt() {   // normalized [[r,c],...] with min r = min c = 0; "" if empty
  if (!IE_SHAPE.size) return "[]";
  const cells = [...IE_SHAPE].map(k => k.split(",").map(Number));
  const minR = Math.min(...cells.map(x => x[0])), minC = Math.min(...cells.map(x => x[1]));
  return "[" + cells.map(([r, c]) => `[${r - minR},${c - minC}]`).join(",") + "]";
}
function renderItemEditor() {
  const p = STATE.players[NAV.cur.player], player = NAV.cur.player;
  const idx = NAV.cur.item;
  const repr = (idx != null && p.items[idx]) || "";   // editing an existing item if idx != null
  const editing = idx != null && repr;
  const type = repr ? typeOf(repr) : "";
  const uuid = repr ? nbtVal(repr, "uuid") : "";
  // prefill the simple fields when editing (reaction/fn list fields are left blank — a blank field is
  // NOT sent, and `set {nbt}` MERGES, so untouched fields are preserved).
  const pre = (k) => { const v = repr ? nbtVal(repr, k) : ""; return v === "None" ? "" : v; };  // unset fields read None
  const eqSet = new Set(nbtList(repr, "equippable"));
  const gearStats = nbtDict(repr, "stats");   // existing per-item stat bonuses, to prefill the boxes
  ensureIGrants(repr);                         // load this item's grants/while_held into the builder
  ensureElHooks({hooks: nbtList(repr, "hooks")});   // and its action hooks (on:equip/use/…)
  ensureIeShape(repr);                         // load this item's grid footprint into the shape editor
  const slotOpts = Object.keys((p.nbt && p.nbt.equip_slots) || {}).filter(s => !s.includes("hand"));
  const chip = (s) => `<span class="chip cat-${slotCat(s)}${eqSet.has(s) ? " on" : ""}" data-slot="${s}"
       onclick="this.classList.toggle('on')"><span class="box"></span>${s}</span>`;
  const slotChips = slotOpts.length ? slotOpts.map(chip).join("")
    : `<span class="muted">this character has no equip_slots defined</span>`;
  const fnHint = `can use functions e.g. <b>ability:polymorph</b> and deltas e.g. <b>stat.health(1)</b>`;
  // proc + fn pair for a hook (procVal prefilled from nbt; fn list left blank on edit, see note above)
  const hook = (id, procPH, fnPH, procVal) => `
      <div class="row"><label class="f">proc</label><input type="text" id="ie_${id}_proc" placeholder="${procPH}" value="${procVal || ""}"></div>
      <div class="row"><label class="f">fn</label><input type="text" id="ie_${id}_fn" placeholder="${fnPH}"></div>`;
  const flatGroup = (title, rows) => `<div class="sub" style="margin:6px 0 0"><h4>${title}</h4><div class="statgrid">`
    + rows.map(([k, lab]) => `<div class="sg"><label>${lab}</label><input type="text" data-stat="${k}" value="${gearStats[k] || ""}"></div>`).join("")
    + `</div></div>`;

  const uuidField = uuid
    ? `<input type="text" id="ie_uuid" value="${uuid}" oninput="checkUUID('${uuid}')"><span id="ie_uuidwarn" class="warn"></span>`
    : `<input type="text" value="(assigned on create)" disabled>`;

  return `<div class="page"><div class="editor" style="max-width:920px">
    <div class="ietop">
      <div class="ieleft">
        <div class="row"><label class="f">item</label><input type="text" id="ie_type" value="${type}" placeholder="type_id e.g. iron_sword">
          <label class="f" style="width:auto">uuid</label>${uuidField}</div>
        <div class="row"><label class="f">name</label><input type="text" id="ie_name" placeholder="name" value="${pre('name')}">
          <label class="f" style="width:auto">icon</label><input type="text" id="ie_emoji" placeholder="🗡️" value="${pre('emoji')}" style="width:60px">
          <label class="f" style="width:auto">qty</label><input type="text" id="ie_qty" value="1" style="width:60px"></div>
        <div class="row"><label class="f">description</label><textarea id="ie_desc" placeholder="item description">${pre('description')}</textarea></div>
        <div class="row"><label class="f">origin</label><input type="text" id="ie_origin" placeholder="where/when found — DM note" value="${pre('origin')}"></div>
      </div>
      <div class="ieright"><div class="sub" style="margin:0"><h4>shape (live: <code>shape[]</code> — grid footprint)</h4>
        <div class="hint">click cells to grow/shrink; the green center is the anchor. Empty = no grid space (loose bin). Rotate with <b>R</b> while dragging in the inventory.</div>
        <div id="ie_shapebox">${ieShapeBoxInner()}</div></div></div>
    </div>

    <div class="sub"><h4>on use (live: <code>/item use</code>)</h4>
      <div class="chips"><span class="chip${pre('consume') ? ' on' : ''}" id="ie_consume_chip" onclick="this.classList.toggle('on')"><span class="box"></span>
        destroy qty ×</span> <input type="text" id="ie_consume" value="${pre('consume') || 1}" style="width:54px"> on use</div>
      ${hook("onuse", "default: item_consumed (comma/space sep)", fnHint.replace(/<\/?b>/g, ""), pre('on_use_proc'))}
      <div class="hint">${fnHint}</div>
    </div>

    <div class="sub"><h4>equip slots (live: <code>equippable[]</code>)</h4>
      <div class="chips">${slotChips}</div>
      <div class="sub" style="margin:8px 0 0"><h4>on_equip (live)</h4>${hook("onequip", "item_equipped", fnHint.replace(/<\/?b>/g, ""), pre('on_equip_proc'))}</div>
      <div class="sub" style="margin:6px 0 0"><h4>when_equipped (live: <code>/proc enable</code> ↔ <code>disable</code>)</h4>
        <div class="row"><label class="f">proc</label><input type="text" id="ie_whenequipped" placeholder="signals kept ON while worn, e.g. has_helmet" value="${pre('when_equipped')}"></div>
        <div class="hint">enabled (sticky) on equip, disabled on unequip — continuous while worn.</div></div>
      <div class="sub" style="margin:6px 0 0"><h4>on_unequip (live)</h4>${hook("onunequip", "item_unequipped", fnHint.replace(/<\/?b>/g, ""), pre('on_unequip_proc'))}</div>
    </div>

    ${igrantsHTML()}

    <div class="sub"><h4>🪝 hooks <span class="muted" style="font-weight:400">— ACTIONS on item events (equip / unequip / use)</span></h4>
      <div id="el_hooksbox">${elHooksInner("item")}</div></div>

    <div class="sub"><h4>gear stats (live while worn)</h4>
      <div class="hint">stored as the item's <code>stats</code> block — folded into your stats live by <code>recompute</code> while equipped, removed on unequip.
        Note: bonuses land on BASE stats; a stat that's formula-derived (some resistances/wards) only moves if you boost a base input it reads.</div>
      ${Object.entries(FLAT_STATS).map(([t, rows]) => flatGroup(t, rows)).join("")}
    </div>

    <div class="sub"><h4>weapon (live: <code>wield</code>)</h4>
      <div class="row"><label class="f">wield</label>
        <select id="ie_wield">${["", "main", "off", "both"].map(o =>
          `<option value="${o}"${pre('wield') === o ? " selected" : ""}>${o || "— not a weapon —"}</option>`).join("")}</select></div>
      <div class="sub todo" style="margin:6px 0 0"><h4>attack — NOT BUILT</h4>
        <div class="statgrid">
          <div class="sg"><label>bludgeon</label><input type="text" disabled></div>
          <div class="sg"><label>pierce</label><input type="text" disabled></div>
          <div class="sg"><label>slash</label><input type="text" disabled></div></div></div>
    </div>

    <div class="row"><label class="f">nbt</label><input type="text" id="ie_custom" placeholder="key:value, key2:value2 — any extra fields"></div>

    <div class="row"><button class="go" onclick="saveItem()">${editing ? "Save changes" : "Create"} → stage command</button>
      <span class="hint">stages <code>${editing ? "/item modify … set" : "/item new"}</code> in the console — review, then Enter.</span></div>
    <div id="ie_preview" class="hint" style="margin-top:6px"></div>
  </div></div>`;
}
function checkUUID(self) {
  const el = document.getElementById("ie_uuid"), warn = document.getElementById("ie_uuidwarn");
  const v = el.value.trim();
  const clash = v && v !== self && allUUIDs().includes(v);
  warn.textContent = clash ? "⚠ this uuid is already in use" : "";
}
function saveItem() {
  const g = (id) => (document.getElementById(id) || {}).value.trim();
  const on = (id) => { const e = document.getElementById(id); return e && e.classList.contains("on"); };
  const slots = [...document.querySelectorAll(".chip.on[data-slot]")].map(c => c.dataset.slot);
  // gear stats -> the item's `stats` block (recompute folds these in live while worn)
  const statBonus = {};
  document.querySelectorAll("[data-stat]").forEach(inp => {
    const n = parseFloat(inp.value);
    if (!isNaN(n) && n !== 0) statBonus[inp.dataset.stat] = n;
  });
  const bracket = (fn) => fn ? "[" + fn.replace(/^\[|\]$/g, "") + "]" : "";   // wrap a reaction fn in [ ]
  const idx = NAV.cur.item, editing = idx != null;
  const q = (s) => '"' + s.replace(/"/g, '\\"') + '"';   // quote free-text so spaces/commas are safe
  const nbt = {};
  if (g("ie_name")) nbt.name = q(g("ie_name"));
  if (g("ie_desc")) nbt.description = q(g("ie_desc"));
  if (g("ie_origin")) nbt.origin = q(g("ie_origin"));
  if (g("ie_emoji")) nbt.emoji = q(g("ie_emoji"));
  // editing always sends equippable + stats (so clearing a chip/box takes effect); creating, only if present.
  if (editing || slots.length) nbt.equippable = "[" + slots.join(",") + "]";
  if (editing || Object.keys(statBonus).length)
    nbt.stats = "{" + Object.entries(statBonus).map(([k, v]) => `${k}:${v}`).join(",") + "}";
  if (g("ie_wield")) nbt.wield = g("ie_wield");
  if (on("ie_consume_chip")) nbt.consume = g("ie_consume") || "1";
  const onuse = bracket(g("ie_onuse_fn")); if (onuse) nbt.on_use = onuse;
  if (g("ie_onuse_proc")) nbt.on_use_proc = g("ie_onuse_proc");
  const oneq = bracket(g("ie_onequip_fn")); if (oneq) nbt.on_equip = oneq;
  if (g("ie_onequip_proc")) nbt.on_equip_proc = g("ie_onequip_proc");
  if (g("ie_whenequipped")) nbt.when_equipped = g("ie_whenequipped");
  const onun = bracket(g("ie_onunequip_fn")); if (onun) nbt.on_unequip = onun;
  if (g("ie_onunequip_proc")) nbt.on_unequip_proc = g("ie_onunequip_proc");
  // grants: split the builder rows by trigger into the item's grants[] (equipped) / while_held[] nbt.
  const gspec = (x) => `${x.kind}:${x.spec.trim()}`;
  const eqG = IGRANTS.filter(x => x.trigger === "equipped" && x.spec.trim()).map(gspec);
  const heldG = IGRANTS.filter(x => x.trigger === "held" && x.spec.trim()).map(gspec);
  if (editing || eqG.length) nbt.grants = "[" + eqG.join(", ") + "]";        // editing always sends (so clearing rows takes effect)
  if (editing || heldG.length) nbt.while_held = "[" + heldG.join(", ") + "]";
  if (editing || ELHOOKS.length) nbt.hooks = "[" + ELHOOKS.join(",") + "]";   // attached action hooks (on:equip/use/…)
  nbt.shape = ieShapeNbt();   // grid footprint (always sent: [] clears it -> loose bin)
  let body = Object.entries(nbt).map(([k, v]) => `${k}:${v}`).join(",");
  const custom = g("ie_custom");                  // free-form extra nbt (items aren't limited to the fields above)
  if (custom) body = body ? body + "," + custom : custom;
  // editing -> MERGE-modify the existing item by inventory index (no duplicate); creating -> new.
  const preview = document.getElementById("ie_preview");
  let line;
  if (editing) {
    if (!body) { preview.textContent = "no changes to save."; return; }
    line = `/item modify ${NAV.cur.player} [${idx}] set {${body}}`;
  } else {
    line = `/item new ${NAV.cur.player} ${g("ie_type") || "item"}{${body}} ${g("ie_qty") || "1"}`;
  }
  cmd.value = line; cmd.focus();
  preview.innerHTML = "staged: <b>" + line.replace(/</g, "&lt;") + "</b>";
}

// ==== COMMAND BAR — autofill + run + history (unchanged core) =================
const cmd = document.getElementById("cmd"), ac = document.getElementById("ac");
let acItems = [], acSel = -1, HIST = [], histIdx = 0;
function splitTok(s) { return s.split(/([ {,>\n])/); }   // \n is a delimiter so tokens never span lines
function lastTok(s) { const p = splitTok(s); return p[p.length - 1]; }
function setLastTok(v) { const p = splitTok(cmd.value); p[p.length - 1] = v; cmd.value = p.join(""); }
function commonPrefix(a) { let p = a[0] || ""; for (const s of a) while (!s.startsWith(p)) p = p.slice(0, -1); return p; }
function acOpen() { return ac.style.display === "block"; }
function hideAC() { ac.style.display = "none"; acItems = []; acSel = -1; }
async function showAC() {
  const line = cmd.value.split("\n").pop();          // complete the current (last) line only
  if (!line.trim()) return hideAC();
  acItems = await (await fetch("/complete?line=" + encodeURIComponent(line))).json();
  if (!acItems.length) return hideAC();
  acSel = -1;
  ac.innerHTML = acItems.map((c, i) => `<div onmousedown="event.preventDefault();acceptAC(${i})">${c}</div>`).join("");
  ac.style.display = "block";
}
function moveSel(d) {
  acSel = (acSel + d + acItems.length) % acItems.length;
  [...ac.children].forEach((el, i) => el.className = i === acSel ? "sel" : "");
}
function acceptAC(i) { if (acItems[i] == null) return; setLastTok(acItems[i] + " "); hideAC(); cmd.focus(); showAC(); }
function tabComplete() {
  if (!acItems.length) return;
  if (acSel >= 0) return acceptAC(acSel);
  if (acItems.length === 1) return acceptAC(0);
  const lcp = commonPrefix(acItems);
  if (lcp.length > lastTok(cmd.value).length) { setLastTok(lcp); showAC(); return; }
  moveSel(1);
}
function recall(d) { if (!HIST.length) return; histIdx = Math.max(0, Math.min(HIST.length, histIdx + d)); cmd.value = HIST[histIdx] || ""; }
function send(line) { cmd.value = line; runCmd(); }
// Fullscreen console toggle (button next to "console", ⌘/ to toggle, Esc to exit).
function toggleConsoleFull(force) {
  const on = force === undefined ? !document.body.classList.contains("confull") : force;
  document.body.classList.toggle("confull", on);
  if (on) cmd.focus();
  const log = document.getElementById("log"); log.scrollTop = log.scrollHeight;
}
async function runOne(line) {                          // run a single command line, append its output
  const r = await (await fetch("/cmd", {method: "POST", headers: {"Content-Type": "application/json"},
                                        body: JSON.stringify({line})})).json();
  const log = document.getElementById("log");
  log.textContent += "ttrpg> " + line + "\n" + (r.output ? r.output + "\n" : "");
  log.scrollTop = log.scrollHeight;
  STATE = r.state;
}
async function runCmd() {                              // run EVERY non-empty line, in order, as one batch
  const lines = cmd.value.split("\n").map(s => s.trim()).filter(Boolean);
  if (!lines.length) return;
  HIST.push(cmd.value); histIdx = HIST.length;
  cmd.value = ""; hideAC();
  for (const line of lines) await runOne(line);
  render();
}
cmd.addEventListener("input", showAC);
cmd.addEventListener("keydown", (e) => {
  if (e.key === "Tab") { e.preventDefault(); tabComplete(); }
  else if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); runCmd(); }  // Shift+Enter = newline (default)
  else if (e.key === "Escape") { hideAC(); if (document.body.classList.contains("confull")) toggleConsoleFull(false); else cmd.blur(); }
  else if (e.key === "ArrowDown") { e.preventDefault(); acOpen() ? moveSel(1) : recall(1); }
  else if (e.key === "ArrowUp") { e.preventDefault(); acOpen() ? moveSel(-1) : recall(-1); }
});
document.addEventListener("click", (e) => { if (!ac.contains(e.target) && e.target !== cmd) hideAC(); });

// ==== GLOBAL KEYBOARD NAV =====================================================
// Active only when you're NOT typing in the console (or any input/textarea/select).
document.addEventListener("keydown", (e) => {
  const tag = (document.activeElement && document.activeElement.tagName) || "";
  const typing = tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";
  if (labOpen() && e.key === "Escape" && !typing) { e.preventDefault(); closeLab(); return; }   // Esc exits the lab
  if (helpOpen() && !typing) {   // overlay up: Esc/? close it; swallow other nav so nothing happens behind it
    if (e.key === "Escape" || e.key === "?") { e.preventDefault(); closeHelp(); }
    return;
  }
  if (e.key === "`") { e.preventDefault(); home(); return; }   // ` ALWAYS returns to the menu
  if ((e.metaKey || e.ctrlKey) && e.key === "/") { e.preventDefault(); toggleConsoleFull(); return; }  // ⌘/ toggles fullscreen console
  if (typing) return;                                          // otherwise let the field have the key
  if (e.key === "Escape") { e.preventDefault(); back(); return; }
  if ((e.key === "+" || e.key === "=") && ADD_ACTION) { e.preventDefault(); ADD_ACTION(); return; }  // +/= fire the screen's "+"
  if (e.key === "?") { e.preventDefault(); openHelp(); return; }                // '?' -> formatting reference (overlay)
  if (e.key === "/") { e.preventDefault(); cmd.focus(); if (!cmd.value) cmd.value = "/"; showAC(); return; }  // '/' -> console
  const fn = KEYMAP[e.key.toLowerCase()];
  if (fn) { e.preventDefault(); fn(); }
});

refresh();
