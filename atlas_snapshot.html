<!doctype html><html><head><meta charset="utf-8"><title>TTRPG Atlas — live snapshot</title>
<style>
  :root { --gold:#f5c542; --bg:#14161a; --panel:#1b1e24; --line:#2c313a; --ink:#d7dae0; }
  * { box-sizing:border-box; } body { margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.4 ui-monospace, Menlo, Consolas, monospace; padding:14px 18px 60px; }
  .muted { color:#6b7280; } .page { position:static; } button { font:inherit; }
  .fnbtn { display:inline-flex; align-items:center; gap:5px; vertical-align:middle; white-space:nowrap;
    font-size:12px; padding:3px 9px; border-radius:6px; cursor:pointer; background:#21252c; color:var(--ink); border:1px solid var(--line); }
  .fnbtn:hover { border-color:#4c6286; } .fnbtn.on { border-color:var(--gold); color:var(--gold); }
  .topbtn { padding:5px 11px; border-radius:6px; background:#21252c; color:var(--ink); border:1px solid var(--line); cursor:pointer; }
  h2 { font-size:15px; margin:0 0 12px; } .snapnote { color:#6b7280; font-size:12px; margin:0 0 14px; }
/* ATLAS */
  .atlaspage { padding: 12px 14px; }
  .atlasbar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
  .atlasgroup { display: inline-flex; align-items: center; gap: 6px; }
  .atlaslbl { color: #6b7280; margin-right: 2px; }
  .atlasbar .fnbtn { white-space: nowrap; }
  .atlasmode { font-size: 12px; margin-bottom: 12px; }
  .atlasgrid { display: inline-block; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #0c0d10; }
  .arow { display: flex; }
  .acell { position: relative; width: 60px; height: 60px; box-sizing: border-box;
           border-right: 1px solid #0008; border-bottom: 1px solid #0008; cursor: default; overflow: hidden; }
  .acell.avoid { background: transparent !important; border-color: transparent; }
  .acell.afog { background: #0c0d10 !important; }
  .acell.adim { filter: brightness(0.45) saturate(0.5); }      /* DM sees unexplored, dimmed */
  .acell:hover { outline: 2px solid var(--gold); outline-offset: -2px; z-index: 2; }
  .aweather { position: absolute; inset: 0; opacity: 0.4; pointer-events: none; }
  .abio { position: absolute; top: 1px; left: 2px; font-size: 15px; line-height: 1; filter: drop-shadow(0 1px 1px #0009); }
  .aw  { position: absolute; top: 1px; right: 2px; font-size: 12px; line-height: 1; }
  .astruct { position: absolute; bottom: 1px; right: 3px; font-size: 11px; color: #f1e4c0; text-shadow: 0 1px 2px #000; }
  .aents { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 1px; flex-wrap: wrap; }
  .adot { font-size: 15px; line-height: 1; text-shadow: 0 0 3px #000, 0 0 3px #000; }
  .adot.a-player { color: #ffffff; } .adot.a-npc { color: #ffe08a; } .adot.a-mob { color: #ff8a8a; }
  .atlastip { position: fixed; display: none; z-index: 9999; pointer-events: none; max-width: 280px;
              background: var(--panel); border: 1px solid #4c6286; border-radius: 7px; padding: 7px 10px;
              font-size: 12px; line-height: 1.5; box-shadow: 0 6px 20px #000a; }
</style></head><body>

let MODE="dm"; let ATLAS_OPT={weather:true,structures:true,entities:true}; let ATLAS_DATA=null;

const ENT_DOT={player:"●",npc:"◆",mob:"▲"};
function escHTML(s){return String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function card(t,inner){return "<div>"+inner+"</div>";}

// ---- ATLAS (the world map) ---------------------------------------------------
// A grid of cells colored by biome. Each cell: biome emblem (top-left), weather (top-right),
// a ▲ if structures sit here, entity dots (players/npcs/mobs). Hovering a cell shows full detail.
// Fog of war: cells a player hasn't explored are dark in Player view (the DM sees all, dimmed).
function renderAtlas() {
  const map = STATE.map || {}, cells = map.cells || {};
  const biomes = STATE.biomes || {}, weather = STATE.weather || {};
  const keys = Object.keys(cells);
  if (!keys.length)
    return `<div class="page">${card("Atlas",
      `<span class="muted">no world yet — generate one in the console: <b>/map generate 12x8</b></span>`)}</div>`;
  let minx = 1e9, maxx = -1e9, miny = 1e9, maxy = -1e9;
  for (const k of keys) { const [x, y] = k.split(",").map(Number);
    minx = Math.min(minx, x); maxx = Math.max(maxx, x); miny = Math.min(miny, y); maxy = Math.max(maxy, y); }
  const entAt = {}, structAt = {};
  (STATE.entities || []).forEach(e => (entAt[e.x + "," + e.y] = entAt[e.x + "," + e.y] || []).push(e));
  (STATE.structures || []).forEach(s => { const p = s.pos || []; if (p.length >= 2)
    (structAt[p[0] + "," + p[1]] = structAt[p[0] + "," + p[1]] || []).push(s); });
  ATLAS_DATA = {cells, biomes, weather, entAt, structAt};
  const playerView = MODE === "player";
  let rows = "";
  for (let y = miny; y <= maxy; y++) {
    let row = "";
    for (let x = minx; x <= maxx; x++) {
      const key = x + "," + y, cell = cells[key];
      if (!cell) { row += `<div class="acell avoid"></div>`; continue; }
      const explored = !!cell.explored;
      if (playerView && !explored) { row += `<div class="acell afog"></div>`; continue; }
      const b = biomes[cell.biome] || {}, w = weather[key];
      const ents = entAt[key] || [], structs = structAt[key] || [];
      const wTint = ATLAS_OPT.weather && WEATHER_TINT[w] ? `<div class="aweather" style="background:${WEATHER_TINT[w]}"></div>` : "";
      const wGlyph = ATLAS_OPT.weather && w ? `<span class="aw">${WEATHER_GLYPH[w] || ""}</span>` : "";
      const sMark = ATLAS_OPT.structures && structs.length ? `<span class="astruct">▲</span>` : "";
      const dots = ATLAS_OPT.entities ? ents.map(e =>
        `<span class="adot a-${e.kind}">${e.symbol || ENT_DOT[e.kind] || "●"}</span>`).join("") : "";
      row += `<div class="acell${explored ? "" : " adim"}" style="background:${b.color || "#333"}"
                onmouseover="atlasHover(event,'${key}')" onmousemove="atlasMove(event)" onmouseout="atlasOut()">
                ${wTint}<span class="abio">${b.glyph || ""}</span>${wGlyph}${sMark}
                <span class="aents">${dots}</span></div>`;
    }
    rows += `<div class="arow">${row}</div>`;
  }
  const opt = (k, label) => `<button class="fnbtn${ATLAS_OPT[k] ? " on" : ""}" onclick="ATLAS_OPT.${k}=!ATLAS_OPT.${k};render()">${label}</button>`;
  const bar = `<div class="atlasbar">
      <span class="muted">${maxx - minx + 1}×${maxy - miny + 1} · ${keys.length} cells</span>
      <span class="atlasgroup"><span class="atlaslbl">layers</span>${opt("weather", "weather")}${opt("structures", "structures")}${opt("entities", "entities")}</span>
      <button class="fnbtn" onclick="send('/map view')" title="also print to the console">console</button>
    </div>
    <div class="atlasmode muted">${playerView ? "🎭 player view — fog hides the unexplored" : "👑 DM view — full map (unexplored dimmed)"}</div>`;
  return `<div class="page atlaspage">${bar}<div class="atlasgrid">${rows}</div><div id="atlastip" class="atlastip"></div></div>`;
}
function atlasHover(ev, key) {
  const t = document.getElementById("atlastip"); if (!t || !ATLAS_DATA) return;
  const {cells, biomes, weather, entAt, structAt} = ATLAS_DATA;
  const cell = cells[key] || {}, b = biomes[cell.biome] || {}, [x, y] = key.split(",");
  let h = `<b>(${x},${y})</b> ${escHTML(b.label || cell.biome || "—")}`;
  if (b.temperature) h += ` <span class="muted">${b.temperature}/${b.moisture}</span>`;
  if (weather[key]) h += `<br>weather: ${escHTML(weather[key])}`;
  const ss = structAt[key] || []; if (ss.length) h += `<br>structures: ${ss.map(s => escHTML(s.name)).join(", ")}`;
  if (cell.name) h += `<br>★ ${escHTML(cell.name)}`;
  const es = entAt[key] || []; if (es.length) h += `<br>here: ${es.map(e => escHTML(e.name) + " (" + e.kind + ")").join(", ")}`;
  if (!cell.explored) h += `<br><span class="muted">· unexplored ·</span>`;
  t.innerHTML = h; t.style.display = "block"; atlasMove(ev);
}
function atlasMove(ev) { const t = document.getElementById("atlastip");
  if (t && t.style.display === "block") { t.style.left = (ev.clientX + 14) + "px"; t.style.top = (ev.clientY + 14) + "px"; } }
function atlasOut() { const t = document.getElementById("atlastip"); if (t) t.style.display = "none"; }

render();
